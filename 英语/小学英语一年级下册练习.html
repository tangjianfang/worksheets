<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小学英语一年级下册 单元练习</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", "微软雅黑", sans-serif; background: #f0f0f0; }

  /* ===== 控制栏 ===== */
  #controls {
    position: sticky; top: 0; z-index: 10;
    background: #1565c0; color: #fff;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  #controls h1 { font-size: 16px; margin-right: 6px; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .ctrl-group select {
    padding: 4px 8px; font-size: 14px; border: none; border-radius: 4px;
    font-family: inherit; cursor: pointer; min-width: 220px;
  }
  .ctrl-group label {
    display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none;
  }
  .ctrl-group input[type="checkbox"] { accent-color: #ffeb3b; }
  .sep { width: 1px; height: 26px; background: rgba(255,255,255,.4); }
  #controls button {
    padding: 6px 16px; font-size: 14px; border: none; border-radius: 4px;
    cursor: pointer; font-weight: bold; font-family: inherit;
  }
  #controls button:hover { opacity: .85; }
  #btn-generate { background: #ffeb3b; color: #1a237e; }
  #btn-print    { background: #f57c00; color: #fff; }

  /* ===== A4 页面 ===== */
  #page-wrapper { display: flex; justify-content: center; padding: 24px 0 40px; }
  #a4-page {
    width: 210mm; min-height: 297mm; background: #fff;
    padding: 12mm; box-shadow: 0 3px 18px rgba(0,0,0,.25);
    display: flex; flex-direction: column;
  }
  .page-title {
    text-align: center; font-size: 20px; font-weight: bold;
    letter-spacing: 1px; padding-bottom: 6px;
    border-bottom: 1px solid #999;
  }
  .info-bar {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 7px 4px; font-size: 13px;
    margin-bottom: 6px; color: #555;
  }
  .info-fill {
    display: inline-block; width: 80px;
    border-bottom: 1px solid #999; margin: 0 4px; height: 18px;
    vertical-align: bottom;
  }

  .section { margin-top: 10px; page-break-inside: avoid; }
  .section-title {
    font-weight: bold; font-size: 14px;
    padding: 2px 0 4px;
    margin-bottom: 6px;
    color: #000;
  }
  .tip { font-size: 11px; color: #888; font-weight: normal; margin-left: 6px; }

  /* ----- 抄写区（四线三格） ----- */
  .write-row {
    display: grid;
    grid-template-columns: 22px 70px 1fr 1fr;
    gap: 0 6px;
    margin-bottom: 5px;
    align-items: center;
  }
  .write-num { font-size: 11px; color: #999; }
  .write-zh  { font-size: 13px; color: #333; }
  .write-en  {
    font-family: "Times New Roman", serif;
    color: #c8c8c8; font-size: 16px; font-style: italic;
    padding-left: 4px;
  }
  .fl-track {
    height: 9mm;
    background:
      linear-gradient(to bottom,
        transparent calc(25% - 0.5px), #bbb calc(25% - 0.5px), #bbb calc(25% + 0.5px), transparent calc(25% + 0.5px),
        transparent calc(50% - 0.5px), #bbb calc(50% - 0.5px), #bbb calc(50% + 0.5px), transparent calc(50% + 0.5px),
        transparent calc(75% - 0.5px), #bbb calc(75% - 0.5px), #bbb calc(75% + 0.5px), transparent calc(75% + 0.5px));
    display: flex; align-items: center; padding: 0 6px;
  }
  .fl-track .fl-en {
    color: #c8c8c8; font-size: 16px; font-style: italic;
    font-family: "Times New Roman", serif;
  }

  /* ----- 翻译区 ----- */
  .trans-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 4px 16px;
  }
  .trans-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; padding: 7px 6px;
  }
  .trans-num { color: #999; min-width: 22px; font-size: 12px; }
  .trans-q   { min-width: 110px; }
  .trans-q.zh { font-size: 14px; }
  .trans-q.en { font-family: "Times New Roman", serif; font-size: 15px; }
  .trans-line { flex: 1; border-bottom: 1px solid #999; height: 18px; }

  /* ----- 句型填空 ----- */
  .word-bank {
    border: 1px dashed #999;
    padding: 6px 10px;
    margin-bottom: 10px;
    font-family: "Times New Roman", serif;
    font-size: 14px;
    line-height: 1.8;
    color: #000;
  }
  .word-bank .bank-title {
    font-family: "Microsoft YaHei", sans-serif;
    font-size: 12px; color: #666;
    margin-right: 6px;
  }
  .cloze-list { padding-left: 4px; }
  .cloze-item {
    display: flex; align-items: flex-start; gap: 6px;
    margin-bottom: 10px; font-size: 15px;
    font-family: "Times New Roman", serif;
  }
  .cloze-num { color: #999; min-width: 22px; font-size: 12px; font-family: inherit; }
  .cloze-text { flex: 1; line-height: 2.2; }
  .cloze-slot {
    display: inline-flex; flex-direction: column;
    align-items: center; vertical-align: middle;
    margin: 0 4px;
  }
  .cloze-blank {
    display: inline-block; min-width: 70px;
    border-bottom: 1px solid #999; height: 16px;
  }
  .cloze-hint {
    font-family: "Microsoft YaHei", sans-serif;
    color: #888; font-size: 11px;
    margin-top: 1px;
  }

  .footer {
    text-align: center; font-size: 11px; color: #aaa;
    padding-top: 8px; margin-top: auto;
  }

  /* ===== 打印 ===== */
  @media print {
    @page { size: A4 portrait; margin: 8mm 10mm; }
    body { background: none; }
    #controls { display: none !important; }
    #page-wrapper { padding: 0; display: block; }
    #a4-page {
      width: 100%; min-height: auto; height: 281mm;
      box-shadow: none; padding: 0;
    }
  }
</style>
</head>
<body>

<div id="controls">
  <h1>英语一年级下册 单元练习</h1>
  <div class="sep"></div>
  <div class="ctrl-group">
    <span>单元：</span>
    <select id="sel-unit"></select>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <label><input type="checkbox" id="cb-write" checked /> 抄写单词</label>
    <label><input type="checkbox" id="cb-trans" checked /> 中英互译</label>
    <label><input type="checkbox" id="cb-cloze" checked /> 句型填空</label>
  </div>
  <div class="sep"></div>
  <button id="btn-generate">⟳ 重新生成</button>
  <button id="btn-print">🖨 打印</button>
</div>

<div id="page-wrapper">
  <div id="a4-page">
    <div class="page-title" id="page-title">英语一年级下册 · 单元练习</div>
    <div class="info-bar">
      <span>Name：<span class="info-fill"></span></span>
      <span>Class：<span class="info-fill"></span></span>
      <span>Date：<span class="info-fill" style="width:100px;"></span></span>
      <span>Score：<span class="info-fill" style="width:60px;"></span></span>
    </div>
    <div id="content"></div>
    <div class="footer">教材：上海教育出版社 · 沪教牛津深圳版小学英语 1B（2025新版）</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ============================================================
   * 词库：沪教牛津深圳版 一年级下册（2025新版 · 6 Units）
   * 数据：{ id, name, sentences:[{en, zh}], words:[{en, zh}] }
   * ============================================================ */
  const UNITS = [
    {
      id: 'u1', name: 'Unit 1 — Food I like',
      sentences: [
        { tpl: 'I like {面条}.' },
        { tpl: 'I don\'t like {牛奶}.' },
        { tpl: 'Do you like {鸡蛋}?' },
        { tpl: 'I want some {米饭} and {胡萝卜}.' },
        { tpl: 'This is a {包子}.' },
        { tpl: 'The {面包} is on the {西红柿}.' }
      ],
      words: [
        {en:'noodles', zh:'面条'},
        {en:'baozi',   zh:'包子'},
        {en:'rice',    zh:'米饭'},
        {en:'carrot',  zh:'胡萝卜'},
        {en:'tomato',  zh:'西红柿'},
        {en:'bread',   zh:'面包'},
        {en:'egg',     zh:'鸡蛋'},
        {en:'milk',    zh:'牛奶'}
      ]
    },
    {
      id: 'u2', name: 'Unit 2 — In the classroom',
      sentences: [
        { tpl: 'This is a {书桌}.' },
        { tpl: 'Open the {门}, please.' },
        { tpl: 'Look at the {黑板}.' },
        { tpl: 'My {书包} is on the {椅子}.' },
        { tpl: 'Close the {窗户}.' }
      ],
      words: [
        {en:'window',     zh:'窗户'},
        {en:'blackboard', zh:'黑板'},
        {en:'door',       zh:'门'},
        {en:'desk',       zh:'书桌'},
        {en:'chair',      zh:'椅子'},
        {en:'schoolbag',  zh:'书包'}
      ]
    },
    {
      id: 'u3', name: 'Unit 3 — I can play',
      sentences: [
        { tpl: 'I can {骑自行车}.' },
        { tpl: 'Can you {踢足球}?' },
        { tpl: 'Let\'s {滑轮滑} together.' },
        { tpl: 'My brother can {骑滑板车}.' },
        { tpl: 'I like to {滑滑板}.' }
      ],
      words: [
        {en:'ride a bike',     zh:'骑自行车'},
        {en:'ride a scooter',  zh:'骑滑板车'},
        {en:'rollerblade',     zh:'滑轮滑'},
        {en:'play football',   zh:'踢足球'},
        {en:'skateboard',      zh:'滑滑板'}
      ]
    },
    {
      id: 'u4', name: 'Unit 4 — Seasons',
      sentences: [
        { tpl: 'It is {热} in {夏天}.' },
        { tpl: 'I like {冬天}.' },
        { tpl: 'It\'s {凉爽的} today.' },
        { tpl: '{秋天} is {暖和的}.' },
        { tpl: 'In {冬天}, it is {寒冷的}.' }
      ],
      words: [
        {en:'warm',   zh:'暖和的'},
        {en:'summer', zh:'夏天'},
        {en:'hot',    zh:'炎热的'},
        {en:'autumn', zh:'秋天'},
        {en:'cool',   zh:'凉爽的'},
        {en:'winter', zh:'冬天'},
        {en:'cold',   zh:'寒冷的'}
      ]
    },
    {
      id: 'u5', name: 'Unit 5 — Fruit',
      sentences: [
        { tpl: 'I like {苹果}.' },
        { tpl: 'This is a {梨}.' },
        { tpl: 'Do you want a {香蕉}?' },
        { tpl: 'The {西瓜} is big.' },
        { tpl: 'Give me a {橙子}, please.' },
        { tpl: 'I have a {桃子} and a {菠萝}.' }
      ],
      words: [
        {en:'lemon',      zh:'柠檬'},
        {en:'banana',     zh:'香蕉'},
        {en:'apple',      zh:'苹果'},
        {en:'watermelon', zh:'西瓜'},
        {en:'pear',       zh:'梨'},
        {en:'pineapple',  zh:'菠萝'},
        {en:'peach',      zh:'桃子'},
        {en:'orange',     zh:'橙子'}
      ]
    },
    {
      id: 'u6', name: 'Unit 6 — Animals',
      sentences: [
        { tpl: 'A {青蛙} is small.' },
        { tpl: 'I see a {蝴蝶}.' },
        { tpl: 'The {金鱼} can swim.' },
        { tpl: 'Look at the {蝌蚪}.' },
        { tpl: 'The {乌龟} is slow.' },
        { tpl: 'A {鸭子} can swim.' }
      ],
      words: [
        {en:'tadpole',   zh:'蝌蚪'},
        {en:'frog',      zh:'青蛙'},
        {en:'butterfly', zh:'蝴蝶'},
        {en:'goldfish',  zh:'金鱼'},
        {en:'duck',      zh:'鸭子'},
        {en:'tortoise',  zh:'乌龟'}
      ]
    }
  ];

  /* ============= 工具 ============= */
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ============= 渲染 ============= */
  function buildWriteSection(words) {
    let html = '<div class="section">';
    html += '<div class="section-title">一、抄写单词 <span class="tip">（按四线三格规范抄写两遍）</span></div>';
    words.forEach((w, i) => {
      html += `<div class="write-row">
        <div class="write-num">${i + 1}.</div>
        <div class="write-zh">${w.zh}</div>
        <div class="fl-track"><span class="fl-en">${w.en}</span></div>
        <div class="fl-track"></div>
      </div>`;
    });
    html += '</div>';
    return html;
  }

  function buildTransSection(words) {
    const items = shuffle(words);
    let half = Math.ceil(items.length / 2);
    const enToZh = items.slice(0, half);
    const zhToEn = items.slice(half);

    let html = '<div class="section">';
    html += '<div class="section-title">二、中英互译 <span class="tip">（写出对应的中文或英文）</span></div>';
    html += '<div class="trans-grid">';
    enToZh.forEach((w, i) => {
      html += `<div class="trans-item">
        <span class="trans-num">${i + 1}.</span>
        <span class="trans-q en">${w.en}</span>
        <span class="trans-line"></span>
      </div>`;
    });
    zhToEn.forEach((w, i) => {
      html += `<div class="trans-item">
        <span class="trans-num">${enToZh.length + i + 1}.</span>
        <span class="trans-q zh">${w.zh}</span>
        <span class="trans-line"></span>
      </div>`;
    });
    html += '</div></div>';
    return html;
  }

  function buildClozeSection(unit) {
    // 句型填空：模板形如 'It is {热} in {夏天}.'，每个 {中文} 渲染为
    // 一条带中文小注释的下划线空白；学生从词库中选择对应英文填入。
    let html = '<div class="section">';
    html += '<div class="section-title">三、选词填空 <span class="tip">（根据括号下的中文提示，从词语库中选出对应单词写在横线上）</span></div>';

    // 词语库（顶部，乱序）
    const bank = shuffle(unit.words.map(w => w.en));
    html += '<div class="word-bank">';
    html += '<span class="bank-title">Word bank：</span>';
    html += bank.join(' &nbsp;/&nbsp; ');
    html += '</div>';

    html += '<div class="cloze-list">';
    unit.sentences.forEach((s, i) => {
      // 把 {中文} 替换为带提示的空白
      const rendered = s.tpl.replace(/\{([^}]+)\}/g, (_, zh) =>
        `<span class="cloze-slot"><span class="cloze-blank"></span><span class="cloze-hint">（${zh}）</span></span>`
      );
      html += `<div class="cloze-item">
        <span class="cloze-num">${i + 1}.</span>
        <span class="cloze-text">${rendered}</span>
      </div>`;
    });
    html += '</div></div>';
    return html;
  }

  /* ============= 主流程 ============= */
  function init() {
    const sel = document.getElementById('sel-unit');
    UNITS.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.name;
      sel.appendChild(opt);
    });

    document.getElementById('btn-generate').addEventListener('click', render);
    document.getElementById('btn-print').addEventListener('click', () => window.print());
    sel.addEventListener('change', render);
    document.getElementById('cb-write').addEventListener('change', render);
    document.getElementById('cb-trans').addEventListener('change', render);
    document.getElementById('cb-cloze').addEventListener('change', render);

    render();
  }

  function render() {
    const id = document.getElementById('sel-unit').value;
    const unit = UNITS.find(u => u.id === id) || UNITS[0];
    const showWrite = document.getElementById('cb-write').checked;
    const showTrans = document.getElementById('cb-trans').checked;
    const showCloze = document.getElementById('cb-cloze').checked;

    document.getElementById('page-title').textContent =
      `英语一年级下册 · ${unit.name}`;

    const c = document.getElementById('content');
    c.innerHTML = '';
    if (showWrite) c.innerHTML += buildWriteSection(unit.words);
    if (showTrans) c.innerHTML += buildTransSection(unit.words);
    if (showCloze) c.innerHTML += buildClozeSection(unit);
    if (!showWrite && !showTrans && !showCloze) {
      c.innerHTML = '<div style="text-align:center;color:#999;padding:60px 0;">请至少选择一种题型</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
