<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小学英语一年级下册 单元练习</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", "微软雅黑", sans-serif; background: #f0f0f0; }

  /* ===== 控制栏 ===== */
  #controls {
    position: sticky; top: 0; z-index: 10;
    background: #6a1b9a; color: #fff;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  #controls h1 { font-size: 16px; margin-right: 6px; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .ctrl-group select {
    padding: 4px 8px; font-size: 14px; border: none; border-radius: 4px;
    font-family: inherit; cursor: pointer; min-width: 230px;
  }
  .ctrl-group label {
    display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none;
  }
  .ctrl-group input[type="checkbox"] { accent-color: #ffeb3b; }
  .sep { width: 1px; height: 26px; background: rgba(255,255,255,.4); }
  #controls button {
    padding: 6px 16px; font-size: 14px; border: none; border-radius: 4px;
    cursor: pointer; font-weight: bold; font-family: inherit;
  }
  #controls button:hover { opacity: .85; }
  #btn-generate { background: #ffeb3b; color: #1a237e; }
  #btn-print    { background: #f57c00; color: #fff; }

  /* ===== A4 页面 ===== */
  #page-wrapper { display: flex; justify-content: center; padding: 24px 0 40px; }
  #a4-page {
    width: 210mm; min-height: 297mm; background: #fff;
    padding: 12mm; box-shadow: 0 3px 18px rgba(0,0,0,.25);
    display: flex; flex-direction: column;
  }
  .page-title {
    text-align: center; font-size: 20px; font-weight: bold;
    letter-spacing: 1px; padding-bottom: 6px; border-bottom: 2px solid #333;
  }
  .info-bar {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 7px 4px; font-size: 13px; border-bottom: 1px solid #bbb;
    margin-bottom: 8px;
  }
  .info-fill {
    display: inline-block; width: 80px;
    border-bottom: 1px solid #555; margin: 0 4px; height: 18px;
    vertical-align: bottom;
  }

  .section { margin-top: 8px; page-break-inside: avoid; }
  .section-title {
    background: #fff; border-left: 4px solid #333;
    border-bottom: 1px solid #333;
    padding: 4px 8px; font-weight: bold; font-size: 14px;
    margin-bottom: 8px;
  }
  .tip { font-size: 11px; color: #666; font-weight: normal; margin-left: 6px; }

  /* ----- 四线三格 ----- */
  /*
   * 高度 10mm = 三格各约 3.3mm，总 4 条线
   * 顶/底为浅灰，中间两线为红色（标准英语本配色简化版）
   */
  .four-line-row {
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 6px;
    margin-bottom: 5px;
    align-items: center;
  }
  .fl-num { font-size: 11px; color: #999; }
  .fl-track {
    position: relative;
    height: 10mm;
    background:
      linear-gradient(to bottom,
        transparent 0,
        transparent calc(0%  - 0.5px),
        #888 0%,
        #888 calc(0% + 0.5px),
        transparent calc(0% + 0.5px));
    /* 用 4 个 box-shadow 模拟 4 条线 */
    box-shadow:
      inset 0  0.5px 0 0 #555,           /* 顶线 */
      inset 0  3.3mm 0 0 #000,           /* 第二线 黑 */
      inset 0  6.6mm 0 0 #000,           /* 第三线 黑 */
      inset 0 -0.5px 0 0 #555;           /* 底线 */
  }
  .fl-sample, .fl-blank {
    position: absolute; top: 0; bottom: 0;
    display: flex; align-items: center;
    padding: 0 6px;
    font-family: "Comic Sans MS", "Century Gothic", sans-serif;
  }
  .fl-sample {
    left: 0; width: 38%;
    color: #d0d0d0;
    font-size: 22px;
    border-right: 1px dashed #bbb;
  }
  .fl-blank {
    left: 38%; right: 0;
    color: #888; font-size: 11px;
    justify-content: flex-end; font-style: italic;
  }

  /* ----- 中英互译 ----- */
  .trans-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 4px 16px;
  }
  .trans-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; padding: 6px;
    border-bottom: 1px dotted #bbb;
  }
  .trans-num { color: #999; min-width: 22px; font-size: 12px; }
  .trans-q {
    min-width: 95px; font-weight: bold;
  }
  .trans-q.en { font-family: "Times New Roman", serif; color: #000; }
  .trans-q.zh { color: #000; }
  .trans-line { flex: 1; border-bottom: 1px solid #555; height: 18px; }

  /* ----- 选词填空 ----- */
  .cloze-box {
    border: 1px dashed #555;
    padding: 6px 10px; margin-bottom: 8px;
    font-size: 13px;
    background: #fff;
  }
  .cloze-box .label { font-weight: bold; color: #000; margin-right: 6px; }
  .cloze-word {
    display: inline-block; padding: 1px 8px;
    border: 1px solid #999; border-radius: 3px;
    margin: 2px 4px; font-family: "Times New Roman", serif;
    font-size: 13px;
  }
  .cloze-list {
    list-style: none; padding: 0; margin: 0;
  }
  .cloze-q {
    padding: 5px 4px;
    border-bottom: 1px dotted #bbb;
    font-size: 14px;
    font-family: "Times New Roman", serif;
    line-height: 1.6;
  }
  .cloze-q .num { color: #999; font-family: inherit; margin-right: 4px; font-size: 12px; }
  .cloze-q .blank {
    display: inline-block; width: 80px;
    border-bottom: 1px solid #555;
    margin: 0 4px; height: 16px; vertical-align: bottom;
  }
  .cloze-q .zh-hint { color: #888; font-family: "Microsoft YaHei", sans-serif; font-size: 12px; margin-left: 6px; }

  .footer {
    text-align: center; font-size: 11px; color: #999;
    padding-top: 8px; margin-top: auto;
    border-top: 1px dashed #ccc;
  }

  /* ===== 打印 ===== */
  @media print {
    @page { size: A4 portrait; margin: 8mm 10mm; }
    body { background: none; }
    #controls { display: none !important; }
    #page-wrapper { padding: 0; display: block; }
    #a4-page {
      width: 100%; min-height: auto; height: 281mm;
      box-shadow: none; padding: 0;
    }
  }
</style>
</head>
<body>

<div id="controls">
  <h1>英语一年级下册 单元练习</h1>
  <div class="sep"></div>
  <div class="ctrl-group">
    <span>Unit：</span>
    <select id="sel-unit"></select>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <label><input type="checkbox" id="cb-write" checked /> 单词抄写</label>
    <label><input type="checkbox" id="cb-trans" checked /> 中英互译</label>
    <label><input type="checkbox" id="cb-cloze" checked /> 选词填空</label>
  </div>
  <div class="sep"></div>
  <button id="btn-generate">⟳ 重新生成</button>
  <button id="btn-print">🖨 打印</button>
</div>

<div id="page-wrapper">
  <div id="a4-page">
    <div class="page-title" id="page-title">英语一年级下册 · 单元练习</div>
    <div class="info-bar">
      <span>Name：<span class="info-fill"></span></span>
      <span>Class：<span class="info-fill"></span></span>
      <span>Date：<span class="info-fill" style="width:100px;"></span></span>
      <span>Score：<span class="info-fill" style="width:60px;"></span></span>
    </div>
    <div id="content"></div>
    <div class="footer">教材：上海教育出版社 · 沪教牛津版（深圳用）小学英语 1B</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ============================================================
   * 词库：沪教牛津版（深圳用）小学英语 1B
   * 数据：{ id, name, words:[{en, zh}], sentence: "句型示例" }
   * ⚠️ 印刷使用前请按家中纸质课本逐项核对
   * ============================================================ */
  const UNITS = [
    { id: 'm1u1', name: 'Module 1 Unit 1 — Look and see', sentence: 'I can see ___.', words: [
      {en:'eye',  zh:'眼睛'},
      {en:'eyes', zh:'两只眼睛'},
      {en:'see',  zh:'看见'},
      {en:'look', zh:'看'},
      {en:'red',  zh:'红色的'},
      {en:'green',zh:'绿色的'}
    ]},
    { id: 'm1u2', name: 'Module 1 Unit 2 — Listen and hear', sentence: 'I can hear ___.', words: [
      {en:'ear',  zh:'耳朵'},
      {en:'ears', zh:'两只耳朵'},
      {en:'hear', zh:'听见'},
      {en:'listen',zh:'听'},
      {en:'bird', zh:'鸟'},
      {en:'bell', zh:'铃'}
    ]},
    { id: 'm1u3', name: 'Module 1 Unit 3 — Taste and smell', sentence: 'I can smell / taste ___.', words: [
      {en:'nose', zh:'鼻子'},
      {en:'mouth',zh:'嘴'},
      {en:'smell',zh:'闻'},
      {en:'taste',zh:'尝'},
      {en:'sweet',zh:'甜的'},
      {en:'sour', zh:'酸的'}
    ]},
    { id: 'm2u4', name: 'Module 2 Unit 4 — Toys I like', sentence: 'I like ___.', words: [
      {en:'doll',   zh:'娃娃'},
      {en:'ball',   zh:'球'},
      {en:'balloon',zh:'气球'},
      {en:'kite',   zh:'风筝'},
      {en:'car',    zh:'小汽车'},
      {en:'train',  zh:'火车'}
    ]},
    { id: 'm2u5', name: 'Module 2 Unit 5 — Food I like', sentence: "I'd like some ___.", words: [
      {en:'rice',     zh:'米饭'},
      {en:'fish',     zh:'鱼'},
      {en:'bread',    zh:'面包'},
      {en:'milk',     zh:'牛奶'},
      {en:'cake',     zh:'蛋糕'},
      {en:'ice cream',zh:'冰淇淋'}
    ]},
    { id: 'm2u6', name: 'Module 2 Unit 6 — Doing things', sentence: 'I can ___.', words: [
      {en:'sing',  zh:'唱歌'},
      {en:'dance', zh:'跳舞'},
      {en:'jump',  zh:'跳'},
      {en:'swim',  zh:'游泳'},
      {en:'run',   zh:'跑'},
      {en:'draw',  zh:'画画'}
    ]},
    { id: 'm3u7', name: 'Module 3 Unit 7 — Small animals', sentence: 'It is a ___.', words: [
      {en:'cat',   zh:'猫'},
      {en:'dog',   zh:'狗'},
      {en:'bird',  zh:'鸟'},
      {en:'rabbit',zh:'兔子'},
      {en:'fish',  zh:'鱼'},
      {en:'duck',  zh:'鸭子'}
    ]},
    { id: 'm3u8', name: 'Module 3 Unit 8 — Hair', sentence: 'She has ___ hair.', words: [
      {en:'long', zh:'长的'},
      {en:'short',zh:'短的'},
      {en:'hair', zh:'头发'},
      {en:'big',  zh:'大的'},
      {en:'small',zh:'小的'},
      {en:'tall', zh:'高的'}
    ]},
    { id: 'm3u9', name: 'Module 3 Unit 9 — In my room', sentence: 'The ___ is in my room.', words: [
      {en:'bed',   zh:'床'},
      {en:'desk',  zh:'书桌'},
      {en:'chair', zh:'椅子'},
      {en:'door',  zh:'门'},
      {en:'window',zh:'窗'},
      {en:'room',  zh:'房间'}
    ]},
    { id: 'm4u10', name: 'Module 4 Unit 10 — The weather', sentence: 'It is ___ today.', words: [
      {en:'sunny',  zh:'晴的'},
      {en:'rainy',  zh:'下雨的'},
      {en:'windy',  zh:'有风的'},
      {en:'cloudy', zh:'多云的'},
      {en:'hot',    zh:'热的'},
      {en:'cold',   zh:'冷的'}
    ]},
    { id: 'm4u11', name: 'Module 4 Unit 11 — In the sky', sentence: 'I can see a ___ in the sky.', words: [
      {en:'sun',  zh:'太阳'},
      {en:'moon', zh:'月亮'},
      {en:'star', zh:'星星'},
      {en:'cloud',zh:'云'},
      {en:'kite', zh:'风筝'},
      {en:'plane',zh:'飞机'}
    ]},
    { id: 'm4u12', name: 'Module 4 Unit 12 — Sea and sand', sentence: 'I can see a ___ at the seaside.', words: [
      {en:'sea',  zh:'大海'},
      {en:'sand', zh:'沙子'},
      {en:'shell',zh:'贝壳'},
      {en:'fish', zh:'鱼'},
      {en:'boat', zh:'小船'},
      {en:'swim', zh:'游泳'}
    ]}
  ];

  /* ============= 工具 ============= */
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ============= 渲染 ============= */
  function buildWriteSection(words) {
    let html = '<div class="section">';
    html += '<div class="section-title">Ⅰ. Copy the words 单词抄写 <span class="tip">（在四线三格内规范书写）</span></div>';
    words.forEach((w, i) => {
      html += `<div class="four-line-row">
        <div class="fl-num">${i + 1}.</div>
        <div class="fl-track">
          <div class="fl-sample">${w.en}</div>
          <div class="fl-blank">copy here →</div>
        </div>
      </div>`;
    });
    html += '</div>';
    return html;
  }

  function buildTransSection(words) {
    // 一半 英→中，一半 中→英
    const shuffled = shuffle(words);
    const half = Math.ceil(shuffled.length / 2);
    let html = '<div class="section">';
    html += '<div class="section-title">Ⅱ. Translate 中英互译 <span class="tip">（写出对应的中文或英文）</span></div>';
    html += '<div class="trans-grid">';
    shuffled.forEach((w, i) => {
      const isEn2Zh = i < half;
      html += `<div class="trans-item">
        <span class="trans-num">${i + 1}.</span>
        <span class="trans-q ${isEn2Zh ? 'en' : 'zh'}">${isEn2Zh ? w.en : w.zh}</span>
        <span class="trans-line"></span>
      </div>`;
    });
    html += '</div></div>';
    return html;
  }

  function buildClozeSection(unit) {
    const words = unit.words;
    const picked = shuffle(words).slice(0, Math.min(5, words.length));
    let html = '<div class="section">';
    html += '<div class="section-title">Ⅲ. Choose and fill in 选词填空 <span class="tip">（从词框中选择合适的单词填入横线）</span></div>';
    // 词框（包含全部单词作为选项，含干扰）
    html += '<div class="cloze-box"><span class="label">Word Bank：</span>';
    shuffle(words).forEach(w => {
      html += `<span class="cloze-word">${w.en}</span>`;
    });
    html += '</div>';
    // 填空句
    html += '<ul class="cloze-list">';
    picked.forEach((w, i) => {
      const sentence = unit.sentence.replace('___', '<span class="blank"></span>');
      html += `<li class="cloze-q">
        <span class="num">${i + 1}.</span>${sentence}
        <span class="zh-hint">（${w.zh}）</span>
      </li>`;
    });
    html += '</ul>';
    html += '</div>';
    return html;
  }

  /* ============= 主流程 ============= */
  function init() {
    const sel = document.getElementById('sel-unit');
    UNITS.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.name;
      sel.appendChild(opt);
    });

    document.getElementById('btn-generate').addEventListener('click', render);
    document.getElementById('btn-print').addEventListener('click', () => window.print());
    sel.addEventListener('change', render);
    document.getElementById('cb-write').addEventListener('change', render);
    document.getElementById('cb-trans').addEventListener('change', render);
    document.getElementById('cb-cloze').addEventListener('change', render);

    render();
  }

  function render() {
    const id = document.getElementById('sel-unit').value;
    const unit = UNITS.find(u => u.id === id) || UNITS[0];
    const showWrite = document.getElementById('cb-write').checked;
    const showTrans = document.getElementById('cb-trans').checked;
    const showCloze = document.getElementById('cb-cloze').checked;

    document.getElementById('page-title').textContent =
      `English Practice · ${unit.name}`;

    const c = document.getElementById('content');
    c.innerHTML = '';
    if (showWrite) c.innerHTML += buildWriteSection(unit.words);
    if (showTrans) c.innerHTML += buildTransSection(unit.words);
    if (showCloze) c.innerHTML += buildClozeSection(unit);
    if (!showWrite && !showTrans && !showCloze) {
      c.innerHTML = '<div style="text-align:center;color:#999;padding:60px 0;">请至少选择一种题型</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
