<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小学数学计算练习</title>
  <style>
    /* ===== 全局 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "宋体", "SimSun", serif;
      background: #f0f0f0;
    }

    /* ===== 控制栏 ===== */
    #controls {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1565c0;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    #controls h1 {
      font-size: 16px;
      font-weight: bold;
      margin-right: 10px;
    }
    .radio-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 15px;
      cursor: pointer;
      user-select: none;
    }
    .radio-group input[type="radio"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #ffeb3b;
    }
    .sep { width: 1px; height: 28px; background: rgba(255,255,255,.4); }
    #controls button {
      padding: 6px 18px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      transition: opacity .15s;
    }
    #controls button:hover { opacity: .85; }
    #btn-generate { background: #ffeb3b; color: #1a237e; }
    #btn-print    { background: #43a047; color: #fff; }
    #btn-answer   { background: #e8f5e9; color: #2e7d32; }
    #btn-home { background: rgba(255,255,255,.18); color: #fff; border: 1px solid rgba(255,255,255,.45); font-weight: normal; }
    #btn-home:hover { background: rgba(255,255,255,.32); }

    /* ===== A4 练习页 ===== */
    #page-wrapper {
      display: flex;
      justify-content: center;
      padding: 24px 0 40px;
    }
    #a4-page {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      padding: 12mm 12mm 10mm;
      box-shadow: 0 3px 18px rgba(0,0,0,.25);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* 标题 */
    .page-title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      padding-bottom: 6px;
      border-bottom: 2px solid #333;
    }

    /* 信息栏 */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 7px 4px;
      font-size: 13px;
      border-bottom: 1px solid #bbb;
      margin-bottom: 6px;
    }
    .info-bar span { display: inline-block; }
    .info-fill {
      display: inline-block;
      width: 80px;
      border-bottom: 1px solid #555;
      margin: 0 4px;
      vertical-align: bottom;
      height: 18px;
    }

    /* 题目网格 */
    #problem-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
    }
    .problem-cell {
      border: 1px solid #e0e0e0;
      padding: 6px 8px 4px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 52px;
    }
    .problem-number {
      font-size: 10px;
      color: #999;
      margin-bottom: 2px;
    }
    .problem-expr {
      font-size: 17px;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .answer-line {
      border-bottom: 1px solid #555;
      width: 28px;
      display: inline-block;
      vertical-align: bottom;
      margin-left: 2px;
      height: 16px;
    }

    /* 页脚 */
    .page-footer {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      padding-top: 6px;
      border-top: 1px dashed #ccc;
      margin-top: 4px;
    }

    .answer-line { position: relative; }
    /* ===== 显示答案模式 ===== */
    .show-answers .answer-line[data-ans]::after {
      content: attr(data-ans);
      position: absolute;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      color: #c62828;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      line-height: 1;
    }

    /* ===== 七巧板题型 ===== */
    .tangram-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
    }
    .tangram-cell {
      border: 1px solid #e0e0e0;
      padding: 5px 8px 4px;
      display: flex;
      flex-direction: column;
      min-height: 60px;
    }
    .tangram-cell .problem-number { font-size: 10px; color: #999; margin-bottom: 1px; }
    .tangram-cell .tg-svg {
      display: flex; justify-content: center; align-items: center;
      margin: 1px 0 2px;
      min-height: 24px;
    }
    .tangram-cell .tg-svg svg { max-width: 100%; height: auto; }
    .tangram-cell .tg-svg-row {
      display: flex; align-items: center; gap: 8px;
      margin: 2px 0 4px;
    }
    .tangram-cell .tg-svg-row svg { flex-shrink: 0; }
    .tangram-cell .tg-q {
      font-size: 13px; line-height: 1.4; flex: 1;
    }
    .tangram-cell .tg-q .blank {
      display: inline-block; min-width: 36px; height: 18px;
      border-bottom: 1.2px solid #333; vertical-align: -3px;
      margin: 0 2px;
    }
    .tangram-cell .tg-opts {
      margin-top: 4px; font-size: 12px; line-height: 1.6;
    }
    .tangram-cell .tg-opt { display: inline-block; margin-right: 10px; }
    .tangram-cell .tg-opt-letter { color: #1565c0; font-weight: bold; margin-right: 2px; }
    .tangram-cell .tg-ans-row {
      display: flex; align-items: flex-end; gap: 6px;
      margin-top: auto; padding-top: 4px;
    }
    .tangram-cell .tg-ans-row .ans-label { font-size: 11px; color: #999; }

    /* ===== 打印样式 ===== */
    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: none; }
      #controls { display: none !important; }
      #page-wrapper { padding: 0; display: block; }
      #a4-page {
        width: 210mm;
        height: 297mm;
        min-height: unset;
        box-shadow: none;
        padding: 8mm 9mm 6mm;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        zoom: 0.76;
      }
      .page-title {
        font-size: 15px !important;
        padding-bottom: 4px !important;
        color: #000 !important;
        border-bottom-color: #000 !important;
      }
      .info-bar {
        font-size: 11px !important;
        padding: 4px 2px !important;
        margin-bottom: 3px !important;
        color: #000 !important;
      }
      .info-fill { border-bottom-color: #000 !important; height: 14px !important; }
      #problem-grid { flex: 1; gap: 0; overflow: hidden; }
      .problem-cell {
        border-color: #aaa;
        min-height: 0;
        padding: 2px 5px 1px !important;
        overflow: hidden;
      }
      .problem-number { font-size: 8px; color: #555; margin-bottom: 0 !important; }
      .problem-expr { font-size: 14px !important; letter-spacing: 0 !important; }
      .answer-line { border-bottom-color: #000; height: 13px !important; width: 24px !important; }
      .page-footer {
        font-size: 9px !important;
        padding-top: 3px !important;
        color: #444 !important;
        border-top-color: #aaa;
      }
      .show-answers .answer-line[data-ans]::after { display: none !important; }
    }
    /* ===== 手机端适配 ===== */
    @media screen and (max-width: 820px) {
      #controls { position: relative; }
      #page-wrapper {
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        padding: 8px 0 24px; justify-content: flex-start;
      }
    }
  </style>
</head>
<body>

<!-- 控制栏 -->
<div id="controls">
  <a id="btn-home" href="../index.html" style="padding:6px 14px;font-size:13px;border-radius:4px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.45);">&#8592; 首页</a>
  <div class="sep"></div>
  <h1>数学计算练习生成器</h1>
  <div class="sep"></div>
  <div class="radio-group">
    <span style="font-size:14px;">范围：</span>
    <label>
      <input type="radio" name="range" value="10" checked /> 10 以内
    </label>
    <label>
      <input type="radio" name="range" value="100" /> 100 以内（不出现个位）
    </label>
  </div>
  <div class="sep"></div>
  <div class="radio-group">
    <span style="font-size:14px;">题型：</span>
    <label><input type="radio" name="qtype" value="arith" checked /> 加减法</label>
    <label><input type="radio" name="qtype" value="tangram" /> 七巧板</label>
  </div>
  <div class="sep"></div>
  <div class="radio-group">
    <span style="font-size:14px;">题数：</span>
    <label><input type="radio" name="count" value="40" checked /> 40 题</label>
    <label><input type="radio" name="count" value="50" /> 50 题</label>
    <label><input type="radio" name="count" value="60" /> 60 题</label>
  </div>
  <div class="sep"></div>
  <button id="btn-generate">&#x27F3; 重新生成</button>
  <button id="btn-answer">👁 显示答案</button>
  <button id="btn-print">&#x1F5A8; 打印</button>
</div>

<!-- A4 页面 -->
<div id="page-wrapper">
  <div id="a4-page">
    <div class="page-title" id="page-title">10以内加减法练习</div>
    <div class="info-bar">
      <span>姓名：<span class="info-fill"></span></span>
      <span>日期：<span class="info-fill" style="width:100px;"></span></span>
      <span>用时：<span class="info-fill" style="width:60px;"></span> 分钟</span>
      <span>得分：<span class="info-fill" style="width:60px;"></span></span>
    </div>
    <div id="problem-grid"></div>
    <div class="page-footer" id="page-footer">共 40 题 · 每题 2.5 分</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // -------- 工具函数 --------
  function randInt(min, max) {
    // 含两端整数
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // 生成一道题：{ expr: '12 + 7 = ', answer: 19 }
  // maxVal=10：标准 10 以内；maxVal=100：100 以内且两个运算数都 ≥ 10（不出现个位）
  function generateProblem(maxVal) {
    const isAdd = Math.random() < 0.5;
    const minOp = maxVal >= 100 ? 10 : 1;  // 100 以内模式：强制两位数
    let a, b, answer;
    if (isAdd) {
      // a + b <= maxVal，且 a,b >= minOp
      // a 范围：[minOp, maxVal - minOp]
      a = randInt(minOp, maxVal - minOp);
      b = randInt(minOp, maxVal - a);
      answer = a + b;
    } else {
      // a - b >= 0，且 a,b >= minOp
      // a 范围：[minOp, maxVal]
      a = randInt(minOp, maxVal);
      b = randInt(minOp, a);
      answer = a - b;
    }
    const op = isAdd ? '+' : '−';
    return { expr: `${a} ${op} ${b} =`, answer };
  }

  // 生成不重复题目列表
  function generateProblems(maxVal, count) {
    const seen = new Set();
    const problems = [];
    let attempts = 0;
    while (problems.length < count && attempts < count * 20) {
      attempts++;
      const p = generateProblem(maxVal);
      const key = p.expr;
      if (!seen.has(key)) {
        seen.add(key);
        problems.push(p);
      }
    }
    // 如果去重后不够，允许重复补足
    while (problems.length < count) {
      problems.push(generateProblem(maxVal));
    }
    return problems;
  }

  // -------- 渲染 --------
  function getSelectedValue(name) {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    if (!el) return null;
    const v = el.value;
    // arith/ tangram 等字符串值原样返回；纯数字才 parseInt
    return /^\d+$/.test(v) ? parseInt(v, 10) : v;
  }

  // ===================================================================
  // 七巧板题池 + SVG 工具
  // ===================================================================
  // 七巧板全套 SVG（简笔画，2 行布局：上行 2 大三角板，下行 5 小件）
  const TG_FULL = `<svg viewBox="0 0 200 80" width="180" height="72" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#333" stroke-width="0.6" stroke-linejoin="round">
      <polygon points="6,6 90,6 48,70" fill="#ff6b6b"/>
      <polygon points="110,6 194,6 152,70" fill="#4ecdc4"/>
      <polygon points="6,76 56,76 31,40" fill="#ffd93d"/>
      <polygon points="60,76 100,76 80,46" fill="#6bcf7f"/>
      <polygon points="104,76 144,76 124,46" fill="#aa96da"/>
      <polygon points="152,76 168,60 184,76" fill="#f38181"/>
      <polygon points="6,40 26,40 46,30 26,30" fill="#c9b1ff"/>
    </g>
  </svg>`;
  // 单独一块大三角板
  const TG_LARGE = `<svg viewBox="0 0 100 90" width="50" height="44" xmlns="http://www.w3.org/2000/svg">
    <polygon points="6,6 94,6 50,84" fill="#ff6b6b" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
  </svg>`;
  // 单独一块中三角板
  const TG_MEDIUM = `<svg viewBox="0 0 60 54" width="36" height="32" xmlns="http://www.w3.org/2000/svg">
    <polygon points="4,4 56,4 30,50" fill="#ffd93d" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
  </svg>`;
  // 单独一块小三角板
  const TG_SMALL = `<svg viewBox="0 0 40 36" width="28" height="24" xmlns="http://www.w3.org/2000/svg">
    <polygon points="3,3 37,3 20,33" fill="#6bcf7f" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
  </svg>`;
  // 单独正方形
  const TG_SQUARE = `<svg viewBox="0 0 40 40" width="30" height="30" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="3" width="34" height="34" fill="#aa96da" stroke="#333" stroke-width="0.8"/>
  </svg>`;
  // 单独平行四边形
  const TG_PARA = `<svg viewBox="0 0 60 40" width="44" height="28" xmlns="http://www.w3.org/2000/svg">
    <polygon points="6,6 54,6 44,34 -4,34" fill="#c9b1ff" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
  </svg>`;
  // 错位平行四边形（看起来像 4 边形但不是平行四边形）
  const TG_TRAP = `<svg viewBox="0 0 60 40" width="44" height="28" xmlns="http://www.w3.org/2000/svg">
    <polygon points="6,6 54,6 38,34 14,34" fill="#f38181" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
  </svg>`;
  // 普通三角形（对照 - 不是大三角板的形状）
  const TG_PLAIN_TRI = `<svg viewBox="0 0 60 50" width="36" height="30" xmlns="http://www.w3.org/2000/svg">
    <polygon points="4,46 30,4 56,46" fill="#6bcf7f" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
  </svg>`;

  // ===== 折叠/切割示意 SVG（带虚线折线/切线）=====
  // 大三角板 + 沿中线（斜边中点→直角顶点）对折
  const TG_FOLD_LARGE = `<svg viewBox="0 0 100 90" width="78" height="70" xmlns="http://www.w3.org/2000/svg">
    <polygon points="6,6 94,6 50,84" fill="#ff6b6b" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
    <line x1="50" y1="45" x2="50" y2="84" stroke="#000" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.8"/>
  </svg>`;
  // 中三角板 + 沿中线对折
  const TG_FOLD_MEDIUM = `<svg viewBox="0 0 60 54" width="56" height="50" xmlns="http://www.w3.org/2000/svg">
    <polygon points="4,4 56,4 30,50" fill="#ffd93d" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
    <line x1="30" y1="27" x2="30" y2="50" stroke="#000" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.8"/>
  </svg>`;
  // 正方形 + 对角线对折
  const TG_FOLD_SQ_DIAG = `<svg viewBox="0 0 60 60" width="56" height="56" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="4" width="52" height="52" fill="#aa96da" stroke="#333" stroke-width="0.8"/>
    <line x1="4" y1="4" x2="56" y2="56" stroke="#000" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.8"/>
  </svg>`;
  // 正方形 + 十字切两刀
  const TG_FOLD_SQ_CROSS = `<svg viewBox="0 0 60 60" width="56" height="56" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="4" width="52" height="52" fill="#aa96da" stroke="#333" stroke-width="0.8"/>
    <line x1="4" y1="30" x2="56" y2="30" stroke="#000" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.8"/>
    <line x1="30" y1="4" x2="30" y2="56" stroke="#000" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.8"/>
  </svg>`;
  // 平行四边形 + 对角线对折
  const TG_FOLD_PARA = `<svg viewBox="0 0 60 40" width="68" height="46" xmlns="http://www.w3.org/2000/svg">
    <polygon points="6,6 54,6 44,34 -4,34" fill="#c9b1ff" stroke="#333" stroke-width="0.8" stroke-linejoin="round"/>
    <line x1="6" y1="6" x2="44" y2="34" stroke="#000" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.8"/>
  </svg>`;

  // ===== 拼合示意 SVG（多块组合）=====
  // 2 个小三角板（沿斜边拼成大三角板）
  const TG_2SMALL_BIG = `<svg viewBox="0 0 60 56" width="56" height="52" xmlns="http://www.w3.org/2000/svg">
    <polygon points="4,4 56,4 30,52" fill="#6bcf7f" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
    <line x1="30" y1="4" x2="30" y2="52" stroke="#000" stroke-width="0.4" stroke-dasharray="2,1.5" opacity="0.7"/>
  </svg>`;
  // 2 个小三角板（分离）
  const TG_2SMALL = `<svg viewBox="0 0 80 36" width="74" height="34" xmlns="http://www.w3.org/2000/svg">
    <polygon points="3,3 37,3 20,33" fill="#6bcf7f" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
    <polygon points="43,3 77,3 60,33" fill="#6bcf7f" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
  </svg>`;
  // 2 个小三角板（沿直角边拼成正方形）
  const TG_2SMALL_SQ = `<svg viewBox="0 0 40 40" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
    <polygon points="3,3 37,3 20,20" fill="#6bcf7f" stroke="#333" stroke-width="0.6"/>
    <polygon points="3,3 20,20 3,37" fill="#6bcf7f" stroke="#333" stroke-width="0.6"/>
  </svg>`;
  // 4 个小三角板拼成正方形
  const TG_4SMALL_SQ = `<svg viewBox="0 0 50 50" width="50" height="50" xmlns="http://www.w3.org/2000/svg">
    <polygon points="3,3 47,3 25,25" fill="#6bcf7f" stroke="#333" stroke-width="0.5"/>
    <polygon points="3,3 25,25 3,47" fill="#6bcf7f" stroke="#333" stroke-width="0.5"/>
    <polygon points="47,3 25,25 47,47" fill="#6bcf7f" stroke="#333" stroke-width="0.5"/>
    <polygon points="3,47 25,25 47,47" fill="#6bcf7f" stroke="#333" stroke-width="0.5"/>
  </svg>`;
  // 2 个中三角板拼成大三角板
  const TG_2MED_BIG = `<svg viewBox="0 0 100 90" width="80" height="72" xmlns="http://www.w3.org/2000/svg">
    <polygon points="6,6 94,6 50,84" fill="none" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="6,6 50,45 50,84" fill="#ffd93d" stroke="#333" stroke-width="0.5" stroke-linejoin="round"/>
    <polygon points="94,6 50,45 50,84" fill="#ffd93d" stroke="#333" stroke-width="0.5" stroke-linejoin="round"/>
  </svg>`;
  // 2 个大三角板拼成正方形
  const TG_2LARGE_SQ = `<svg viewBox="0 0 80 80" width="70" height="70" xmlns="http://www.w3.org/2000/svg">
    <polygon points="3,3 77,3 40,40" fill="#ff6b6b" stroke="#333" stroke-width="0.5"/>
    <polygon points="3,3 40,40 3,77" fill="#ff6b6b" stroke="#333" stroke-width="0.5"/>
    <polygon points="77,3 40,40 77,77" fill="#ff6b6b" stroke="#333" stroke-width="0.5"/>
    <polygon points="3,77 40,40 77,77" fill="#ff6b6b" stroke="#333" stroke-width="0.5"/>
  </svg>`;
  // 1 中 + 1 小 并排
  const TG_MED_SMALL = `<svg viewBox="0 0 100 50" width="76" height="38" xmlns="http://www.w3.org/2000/svg">
    <polygon points="4,4 60,4 32,46" fill="#ffd93d" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
    <polygon points="64,4 96,4 80,30" fill="#6bcf7f" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
  </svg>`;
  // 1 正方 + 1 小
  const TG_SQ_SMALL = `<svg viewBox="0 0 80 40" width="74" height="36" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="4" width="32" height="32" fill="#aa96da" stroke="#333" stroke-width="0.6"/>
    <polygon points="44,4 76,4 60,30" fill="#6bcf7f" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
  </svg>`;
  // 1 大 + 1 小
  const TG_LAR_SMALL = `<svg viewBox="0 0 130 90" width="80" height="56" xmlns="http://www.w3.org/2000/svg">
    <polygon points="4,6 60,6 32,52" fill="#ff6b6b" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
    <polygon points="68,4 110,4 89,38" fill="#6bcf7f" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
  </svg>`;
  // 1 中 + 1 正方
  const TG_MED_SQ = `<svg viewBox="0 0 100 60" width="80" height="48" xmlns="http://www.w3.org/2000/svg">
    <polygon points="4,4 56,4 30,52" fill="#ffd93d" stroke="#333" stroke-width="0.6" stroke-linejoin="round"/>
    <rect x="62" y="14" width="32" height="32" fill="#aa96da" stroke="#333" stroke-width="0.6"/>
  </svg>`;

  // 7 块 关系数据：
  //   大三角板 = 1/4 正方形；中三角板 = 1/8；小三角板 = 1/16；
  //   正方形 = 1/8；平行四边形 = 1/8
  //   2 个小三角板 可拼成 中三角板（面积 1/8）/ 正方形 / 平行四边形
  //   1 个中三角板 + 2 个小三角板 = 1 个大三角板
  // 题池：每题 { type, q, a, opts?, svg? }
  //   强调：空间想象、逻辑推理、组合分析 —— 不只是"识别某块"
  //   难度梯度：折叠/切割（最想象）> 拼合推理 > 面积关系 > 图形特性 > 拼图应用
  const TANGRAM_QUESTIONS = [
    // ====== 折叠/切割（空间想象 - 最难）======
    { type: 'mc', svg: TG_FOLD_LARGE, q: '把一块大三角板沿虚线对折一次，会得到什么？',
      opts: ['2 个中三角板', '2 个小三角板', '1 个正方形', '1 个平行四边形'], a: 'A' },
    { type: 'mc', svg: TG_FOLD_MEDIUM, q: '把一块中三角板沿虚线对折一次，会得到什么？',
      opts: ['1 个大三角板', '2 个小三角板', '1 个正方形', '1 个平行四边形'], a: 'B' },
    { type: 'mc', svg: TG_FOLD_SQ_DIAG, q: '把一个正方形沿对角线对折一次，会得到什么？',
      opts: ['2 个大三角板', '2 个中三角板', '4 个小三角板', '1 个长方形'], a: 'A' },
    { type: 'mc', svg: TG_FOLD_SQ_CROSS, q: '把一个正方形按虚线切两刀（十字），会得到几个什么？',
      opts: ['2 个大三角板', '4 个小三角板', '4 个中三角板', '2 个正方形'], a: 'B' },
    { type: 'mc', svg: TG_FOLD_PARA, q: '把一个平行四边形沿对角线对折一次，会得到什么？',
      opts: ['2 个大三角板', '2 个中三角板', '2 个小三角板', '1 中 + 1 小'], a: 'C' },
    { type: 'mc', svg: TG_FOLD_LARGE, q: '把一块大三角板沿虚线对折，再对折一次（共两次），会得到几个什么？',
      opts: ['2 个中三角板', '4 个小三角板', '1 个正方形', '4 个中三角板'], a: 'B' },

    // ====== 面积关系（逻辑推理）======
    { type: 'mc', svg: TG_MEDIUM, q: '1 块中三角板的面积 = ? 块小三角板',
      opts: ['1', '2', '3', '4'], a: 'B' },
    { type: 'mc', svg: TG_LARGE, q: '1 块大三角板的面积 = ? 块中三角板',
      opts: ['1', '2', '3', '4'], a: 'B' },
    { type: 'mc', svg: TG_LARGE, q: '1 块大三角板的面积 = ? 块小三角板',
      opts: ['2', '3', '4', '8'], a: 'C' },
    { type: 'mc', svg: TG_SQUARE, q: '1 个正方形的面积 = ? 块小三角板',
      opts: ['2', '4', '6', '8'], a: 'B' },
    { type: 'mc', svg: TG_FULL, q: '1 个完整的七巧板（7 块拼成的正方形）面积 = ? 块小三角板',
      opts: ['8', '12', '14', '16'], a: 'D' },
    { type: 'mc', svg: TG_FULL, q: '七巧板里哪一块的面积 = 大三角板的 1/2？',
      opts: ['小三角板', '中三角板', '正方形', '平行四边形'], a: 'B' },
    { type: 'mc', svg: TG_SQUARE, q: '七巧板里的正方形、平行四边形、中三角板，它们的面积 ___？',
      opts: ['都不同', '正方形最大', '三个一样大', '平行四边形最小'], a: 'C' },

    // ====== 拼合/拆解（组合想象）======
    { type: 'mc', svg: TG_2SMALL, q: '把 2 个小三角板（斜边对斜边）拼在一起，可以得到什么？',
      opts: ['1 个中三角板', '1 个正方形', '1 个平行四边形', '以上都可能'], a: 'D' },
    { type: 'mc', svg: TG_2MED_BIG, q: '把 2 个中三角板（如图）拼在一起，可以得到什么？',
      opts: ['1 个大三角板', '1 个正方形', '1 个平行四边形', '以上都可能'], a: 'D' },
    { type: 'mc', svg: TG_2LARGE_SQ, q: '把 2 个大三角板（如图）拼在一起，可以得到什么？',
      opts: ['1 个正方形', '1 个长方形', '1 个平行四边形', '以上都可能'], a: 'D' },
    { type: 'mc', svg: TG_4SMALL_SQ, q: '把 4 个小三角板拼成如图，可以得到什么？',
      opts: ['1 个正方形', '1 个大三角板', '1 个平行四边形', '以上都能'], a: 'D' },
    { type: 'mc', svg: TG_MED_SMALL, q: '1 个中三角板 + 1 个小三角板（如图），能拼成一个标准七巧板图形吗？',
      opts: ['能（1 大）', '能（1 正方）', '能（1 平行）', '不能'], a: 'D' },
    { type: 'mc', svg: TG_SQ_SMALL, q: '1 个正方形 + 1 个小三角板（如图），能拼成一个标准七巧板图形吗？',
      opts: ['能（1 大）', '能（1 中）', '能（1 平行）', '不能'], a: 'D' },
    { type: 'mc', svg: TG_LAR_SMALL, q: '1 个大三角板 + 1 个小三角板（如图），面积上等于？',
      opts: ['2 个大三角板', '1 个大三角板 + 1 小 = 5 小', '2 个中三角板', '1 个七巧板'], a: 'B' },
    { type: 'mc', svg: TG_MED_SQ, q: '1 个中三角板 + 1 个正方形（如图），面积上等于？',
      opts: ['1 个大三角板', '2 个中三角板', '1 个七巧板的一半', '以上都对'], a: 'D' },

    // ====== 图形特性（观察推理）======
    { type: 'mc', svg: TG_FULL, q: '七巧板里大小完全一样的图形有 ___ 对？',
      opts: ['1 对', '2 对', '3 对', '4 对'], a: 'B' },
    { type: 'mc', svg: TG_LARGE, q: '把大三角板绕它的直角顶点旋转 90°，还是它本身吗？',
      opts: ['是', '不是', '变小了', '不确定'], a: 'A' },
    { type: 'mc', svg: TG_FULL, q: '七巧板里一共有几种不同形状的图形？',
      opts: ['2 种', '3 种', '4 种', '5 种'], a: 'B' },
    { type: 'mc', svg: TG_FULL, q: '七巧板里"只此一块"（没有重复）的有 ___ 块？',
      opts: ['1 块', '2 块', '3 块', '5 块'], a: 'C' },
    { type: 'mc', svg: TG_PARA, q: '七巧板里的平行四边形左右翻转后，和原来 ___？',
      opts: ['不一样', '一样（轴对称）', '大小变了', '颜色变了'], a: 'B' },

    // ====== 拼图/应用（综合推理）======
    { type: 'mc', svg: TG_FULL, q: '用七巧板拼一个新的"正方形"（不是七巧板本身），最少需要几块？',
      opts: ['1 块（已有正方形）', '2 块（2 个大三角板）', '3 块', '4 块'], a: 'B' },
    { type: 'mc', svg: TG_FULL, q: '用七巧板拼一个新的"长方形"，最少需要几块？',
      opts: ['1 块', '2 块', '3 块', '4 块'], a: 'C' },
    { type: 'mc', svg: TG_FULL, q: '用七巧板拼一个新的"等腰三角形"（比已有大三角板更大），最少需要几块？',
      opts: ['1 块', '2 块', '3 块', '4 块'], a: 'B' },
    { type: 'mc', svg: TG_FULL, q: '七巧板能拼出"非对称"图形（左右不一样的）吗？',
      opts: ['不能', '能（用 1 块平行四边形）', '能（用 2 块大三角板）', '能（任意组合）'], a: 'B' },
  ];

  function generateTangramQuestion() {
    return TANGRAM_QUESTIONS[randInt(0, TANGRAM_QUESTIONS.length - 1)];
  }

  function renderArith() {
    const maxVal = getSelectedValue('range') || 10;
    const count  = getSelectedValue('count') || 40;

    // 标题 + 页脚
    const titleSuffix = maxVal >= 100 ? '（两位数）' : '';
    document.getElementById('page-title').textContent =
      `${maxVal}以内加减法练习${titleSuffix}`;
    const scorePerQ = count > 0 ? (100 / count).toFixed(1) : 0;
    document.getElementById('page-footer').textContent =
      `共 ${count} 题 · 每题 ${scorePerQ} 分`;

    // 5 列网格
    const grid = document.getElementById('problem-grid');
    grid.style.gridTemplateColumns = 'repeat(5, 1fr)';
    grid.className = '';
    const cols = 5;
    const rows = Math.ceil(count / cols);
    grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

    const problems = generateProblems(maxVal, count);
    grid.innerHTML = '';
    problems.forEach((p, i) => {
      const cell = document.createElement('div');
      cell.className = 'problem-cell';
      cell.innerHTML =
        `<div class="problem-number">${i + 1}.</div>` +
        `<div class="problem-expr">${p.expr} <span class="answer-line" data-ans="${p.answer}"></span></div>`;
      grid.appendChild(cell);
    });
    hideAnswers();
  }

  function renderTangram() {
    const count = getSelectedValue('count') || 40;
    document.getElementById('page-title').textContent = '七巧板练习';
    document.getElementById('page-footer').textContent =
      `共 ${count} 题 · 七巧板综合题`;

    const grid = document.getElementById('problem-grid');
    grid.style.gridTemplateColumns = '1fr 1fr';
    grid.className = 'tangram-grid';
    // 不强制行高，让每行按内容自适应
    grid.style.gridTemplateRows = '';

    // 抽题：随机不重复
    const seen = new Set();
    const picks = [];
    let attempts = 0;
    while (picks.length < count && attempts < count * 10) {
      attempts++;
      const q = generateTangramQuestion();
      const key = q.q;
      if (!seen.has(key)) { seen.add(key); picks.push(q); }
    }
    while (picks.length < count) picks.push(generateTangramQuestion());

    grid.innerHTML = '';
    picks.forEach((q, i) => {
      const cell = document.createElement('div');
      cell.className = 'tangram-cell';

      // 题目部分
      let html = `<div class="problem-number">${i + 1}.</div>`;
      // 题图（折叠/拼合示意） - 顶部
      if (q.svg) {
        html += `<div class="tg-svg">${q.svg}</div>`;
      }
      // SVG 行（选项小图）
      if (q.opts && Array.isArray(q.opts)) {
        // 选择题：每个选项都内嵌一个 SVG
        const optsHtml = q.opts.map((o, idx) => {
          if (typeof o === 'string' && o.startsWith('<svg')) {
            return `<span class="tg-opt"><span class="tg-opt-letter">${String.fromCharCode(65 + idx)}.</span>${o}</span>`;
          }
          return `<span class="tg-opt"><span class="tg-opt-letter">${String.fromCharCode(65 + idx)}.</span>${o}</span>`;
        }).join('');
        html += `<div class="tg-opts">${optsHtml}</div>`;
      }
      html += `<div class="tg-q">${q.q}</div>`;
      // 答题区
      html += `<div class="tg-ans-row"><span class="ans-label">答：</span><span class="answer-line" data-ans="${q.a}"></span></div>`;
      cell.innerHTML = html;
      grid.appendChild(cell);
    });
    hideAnswers();
  }

  function hideAnswers() {
    document.getElementById('a4-page').classList.remove('show-answers');
    const btn = document.getElementById('btn-answer');
    btn.textContent = '👁 显示答案';
    btn.style.background = '';
    btn.style.color = '';
  }

  function render() {
    const qtype = getSelectedValue('qtype') || 'arith';
    if (qtype === 'tangram') renderTangram();
    else renderArith();
  }

  // -------- 事件绑定 --------
  document.getElementById('btn-generate').addEventListener('click', render);
  document.getElementById('btn-answer').addEventListener('click', function () {
    const page = document.getElementById('a4-page');
    const btn = document.getElementById('btn-answer');
    const on = page.classList.toggle('show-answers');
    btn.textContent = on ? '👁 隐藏答案' : '👁 显示答案';
    btn.style.background = on ? '#c62828' : '';
    btn.style.color = on ? '#fff' : '';
  });
  document.getElementById('btn-print').addEventListener('click', function () {
    smartPrint();
  });

  // 切换范围/题数/题型时自动重新生成
  document.querySelectorAll('input[name="range"], input[name="count"], input[name="qtype"]')
    .forEach(function (el) {
      el.addEventListener('change', render);
    });

  // 初始生成
  render();

  // 微信检测打印
  function smartPrint() {
    if (/MicroMessenger/i.test(navigator.userAgent)) {
      document.getElementById('wx-print-mask').style.display = 'block';
    } else {
      window.print();
    }
  }
})();
</script>

    <div style="font-size:14px;color:#333;line-height:2.1;text-align:left;background:#f5f5f5;border-radius:8px;padding:12px 14px">
      ① 点击右上角 <strong>···</strong> 菜单<br>
      ② 选择 <strong>在浏览器打开</strong><br>
