<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小学语文一年级下册 单元练习</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "宋体", "SimSun", serif; background: #f0f0f0; }

  /* ===== 控制栏 ===== */
  #controls {
    position: sticky; top: 0; z-index: 10;
    background: #2e7d32; color: #fff;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  #controls h1 { font-size: 16px; margin-right: 6px; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .ctrl-group select {
    padding: 4px 8px; font-size: 14px; border: none; border-radius: 4px;
    font-family: inherit; cursor: pointer; min-width: 200px;
  }
  .ctrl-group label {
    display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none;
  }
  .ctrl-group input[type="checkbox"] { accent-color: #ffeb3b; }
  .sep { width: 1px; height: 26px; background: rgba(255,255,255,.4); }
  #controls button {
    padding: 6px 16px; font-size: 14px; border: none; border-radius: 4px;
    cursor: pointer; font-weight: bold; font-family: inherit;
  }
  #controls button:hover { opacity: .85; }
  #btn-generate { background: #ffeb3b; color: #1a237e; }
  #btn-print    { background: #f57c00; color: #fff; }

  /* ===== A4 页面 ===== */
  #page-wrapper { display: flex; justify-content: center; padding: 24px 0 40px; }
  #a4-page {
    width: 210mm; min-height: 297mm; background: #fff;
    padding: 12mm; box-shadow: 0 3px 18px rgba(0,0,0,.25);
    display: flex; flex-direction: column;
  }
  .page-title {
    text-align: center; font-size: 20px; font-weight: bold;
    letter-spacing: 2px; padding-bottom: 6px; border-bottom: 2px solid #333;
  }
  .info-bar {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 7px 4px; font-size: 13px; border-bottom: 1px solid #bbb;
    margin-bottom: 8px;
  }
  .info-fill {
    display: inline-block; width: 80px;
    border-bottom: 1px solid #555; margin: 0 4px; height: 18px;
    vertical-align: bottom;
  }

  .section { margin-top: 8px; page-break-inside: avoid; }
  .section-title {
    background: #fff; border-left: 4px solid #333;
    border-bottom: 1px solid #333;
    padding: 4px 8px; font-weight: bold; font-size: 14px;
    margin-bottom: 8px;
  }
  .tip { font-size: 11px; color: #666; font-weight: normal; margin-left: 6px; }

  /* ----- 拼音区 ----- */
  .pinyin-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 4px 16px;
  }
  .pinyin-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; padding: 5px 6px;
    border-bottom: 1px dotted #bbb;
  }
  .pinyin-item .num { color: #999; min-width: 22px; font-size: 12px; }
  .pinyin-item .py {
    font-family: "Times New Roman", serif;
    font-size: 16px; color: #1976d2; min-width: 100px;
    letter-spacing: 1px;
  }
  .pinyin-item .ans-line { flex: 1; border-bottom: 1px solid #555; height: 18px; }

  /* ----- 田字格区 ----- */
  .tian-row {
    display: grid;
    grid-template-columns: 22px repeat(4, 1fr);
    gap: 0;
    margin-bottom: 4px;
    align-items: stretch;
  }
  .tian-num { font-size: 11px; color: #999; padding-top: 22px; }
  .tian-cell {
    display: flex; flex-direction: column;
    padding: 0 1px;
  }
  .tian-py {
    text-align: center;
    font-family: "Times New Roman", serif;
    color: #1976d2; font-size: 13px;
    min-height: 18px; padding: 1px 0;
    letter-spacing: 1px;
  }
  .tian-box {
    height: 16mm;
    border: 1.5px solid #d32f2f;
    background:
      linear-gradient(to right, transparent calc(50% - 0.5px), #d32f2f calc(50% - 0.5px), #d32f2f calc(50% + 0.5px), transparent calc(50% + 0.5px)),
      linear-gradient(to bottom, transparent calc(50% - 0.5px), #d32f2f calc(50% - 0.5px), #d32f2f calc(50% + 0.5px), transparent calc(50% + 0.5px));
    background-size: 4px 100%, 100% 4px;
    background-position: center, center;
    background-repeat: repeat-x, repeat-y;
    display: flex; align-items: center; justify-content: center;
  }
  .tian-char {
    color: #e0e0e0; font-size: 38px; line-height: 1;
    font-family: "楷体", "KaiTi", serif;
  }

  .footer {
    text-align: center; font-size: 11px; color: #999;
    padding-top: 8px; margin-top: auto;
    border-top: 1px dashed #ccc;
  }

  /* ===== 打印 ===== */
  @media print {
    @page { size: A4 portrait; margin: 8mm 10mm; }
    body { background: none; }
    #controls { display: none !important; }
    #page-wrapper { padding: 0; display: block; }
    #a4-page {
      width: 100%; min-height: auto; height: 281mm;
      box-shadow: none; padding: 0;
    }
  }
</style>
</head>
<body>

<div id="controls">
  <h1>语文一年级下册 单元练习</h1>
  <div class="sep"></div>
  <div class="ctrl-group">
    <span>课文：</span>
    <select id="sel-unit"></select>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <label><input type="checkbox" id="cb-pinyin" checked /> 看拼音写汉字</label>
    <label><input type="checkbox" id="cb-tian"   checked /> 田字格练写</label>
  </div>
  <div class="sep"></div>
  <button id="btn-generate">⟳ 重新生成</button>
  <button id="btn-print">🖨 打印</button>
</div>

<div id="page-wrapper">
  <div id="a4-page">
    <div class="page-title" id="page-title">语文一年级下册 · 单元练习</div>
    <div class="info-bar">
      <span>姓名：<span class="info-fill"></span></span>
      <span>班级：<span class="info-fill"></span></span>
      <span>日期：<span class="info-fill" style="width:100px;"></span></span>
      <span>得分：<span class="info-fill" style="width:60px;"></span></span>
    </div>
    <div id="content"></div>
    <div class="footer">教材：人民教育出版社 · 义务教育教科书 · 语文一年级下册（统编版）</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ============================================================
   * 词库：人教统编版 一年级下册 各课"会写字"
   * 数据结构：{ id, name, words: [{h: 汉字, p: 拼音}] }
   * ⚠️ 印刷使用前请按家中纸质课本逐字核对
   * ============================================================ */
  const UNITS = [
    { id: 'sz1', name: '识字1·春夏秋冬', words: [
      {h:'春',p:'chūn'},{h:'风',p:'fēng'},{h:'冬',p:'dōng'},{h:'雪',p:'xuě'},
      {h:'花',p:'huā'},{h:'飞',p:'fēi'},{h:'入',p:'rù'}
    ]},
    { id: 'sz2', name: '识字2·姓氏歌', words: [
      {h:'姓',p:'xìng'},{h:'什',p:'shén'},{h:'么',p:'me'},{h:'双',p:'shuāng'},
      {h:'国',p:'guó'},{h:'王',p:'wáng'},{h:'方',p:'fāng'}
    ]},
    { id: 'sz3', name: '识字3·小青蛙', words: [
      {h:'青',p:'qīng'},{h:'清',p:'qīng'},{h:'气',p:'qì'},{h:'晴',p:'qíng'},
      {h:'情',p:'qíng'},{h:'请',p:'qǐng'},{h:'生',p:'shēng'}
    ]},
    { id: 'sz4', name: '识字4·猜字谜', words: [
      {h:'字',p:'zì'},{h:'左',p:'zuǒ'},{h:'右',p:'yòu'},{h:'红',p:'hóng'},
      {h:'时',p:'shí'},{h:'动',p:'dòng'},{h:'万',p:'wàn'}
    ]},
    { id: 'k1', name: '课文1·吃水不忘挖井人', words: [
      {h:'吃',p:'chī'},{h:'叫',p:'jiào'},{h:'主',p:'zhǔ'},{h:'江',p:'jiāng'},
      {h:'住',p:'zhù'},{h:'没',p:'méi'},{h:'以',p:'yǐ'}
    ]},
    { id: 'k2', name: '课文2·我多想去看看', words: [
      {h:'会',p:'huì'},{h:'走',p:'zǒu'},{h:'北',p:'běi'},{h:'京',p:'jīng'},
      {h:'门',p:'mén'},{h:'广',p:'guǎng'},{h:'天',p:'tiān'}

    { id: 'k3', name: '课文3·一个接一个', words: [

    ]},
    { id: 'k4', name: '课文4·四个太阳', words: [
      {h:'太',p:'tài'},{h:'阳',p:'yáng'},{h:'校',p:'xiào'},{h:'金',p:'jīn'},
      {h:'秋',p:'qiū'},{h:'因',p:'yīn'},{h:'为',p:'wèi'}
    ]},
    { id: 'k5', name: '课文5·小公鸡和小鸭子', words: [
      {h:'他',p:'tā'},{h:'河',p:'hé'},{h:'说',p:'shuō'},{h:'也',p:'yě'},
      {h:'地',p:'dì'},{h:'听',p:'tīng'},{h:'哥',p:'gē'}
    ]},
    { id: 'k6', name: '课文6·树和喜鹊', words: [
      {h:'单',p:'dān'},{h:'居',p:'jū'},{h:'招',p:'zhāo'},{h:'呼',p:'hū'},
      {h:'快',p:'kuài'},{h:'乐',p:'lè'},{h:'喜',p:'xǐ'}
    ]},
    { id: 'k7', name: '课文7·怎么都快乐', words: [
      {h:'玩',p:'wán'},{h:'很',p:'hěn'},{h:'当',p:'dāng'},{h:'音',p:'yīn'},
      {h:'讲',p:'jiǎng'},{h:'行',p:'xíng'},{h:'许',p:'xǔ'}
    ]},
    { id: 'k8', name: '课文8·静夜思', words: [
      {h:'思',p:'sī'},{h:'床',p:'chuáng'},{h:'前',p:'qián'},{h:'光',p:'guāng'},
      {h:'低',p:'dī'},{h:'故',p:'gù'},{h:'乡',p:'xiāng'}
    ]},
    { id: 'k9', name: '课文9·夜色', words: [
      {h:'色',p:'sè'},{h:'外',p:'wài'},{h:'看',p:'kàn'},{h:'爸',p:'bà'},
      {h:'晚',p:'wǎn'},{h:'笑',p:'xiào'},{h:'再',p:'zài'}
    ]},
    { id: 'k10', name: '课文10·端午粽', words: [
      {h:'午',p:'wǔ'},{h:'节',p:'jié'},{h:'叶',p:'yè'},{h:'米',p:'mǐ'},
      {h:'真',p:'zhēn'},{h:'分',p:'fēn'},{h:'豆',p:'dòu'}
    ]},
    { id: 'k11', name: '课文11·彩虹', words: [
      {h:'那',p:'nà'},{h:'着',p:'zhe'},{h:'到',p:'dào'},{h:'高',p:'gāo'},
      {h:'兴',p:'xìng'},{h:'千',p:'qiān'},{h:'成',p:'chéng'}
    ]},
    { id: 'sz5', name: '识字5·动物儿歌', words: [
      {h:'间',p:'jiān'},{h:'迷',p:'mí'},{h:'造',p:'zào'},{h:'运',p:'yùn'},
      {h:'池',p:'chí'},{h:'欢',p:'huān'},{h:'网',p:'wǎng'}
    ]},
    { id: 'sz6', name: '识字6·古对今', words: [
      {h:'古',p:'gǔ'},{h:'凉',p:'liáng'},{h:'细',p:'xì'},{h:'夕',p:'xī'},
      {h:'李',p:'lǐ'},{h:'语',p:'yǔ'},{h:'香',p:'xiāng'}
    ]},
    { id: 'sz7', name: '识字7·操场上', words: [
      {h:'打',p:'dǎ'},{h:'拍',p:'pāi'},{h:'跑',p:'pǎo'},{h:'足',p:'zú'},
      {h:'声',p:'shēng'},{h:'身',p:'shēn'},{h:'体',p:'tǐ'}
    ]},
    { id: 'sz8', name: '识字8·人之初', words: [
      {h:'之',p:'zhī'},{h:'相',p:'xiāng'},{h:'近',p:'jìn'},{h:'习',p:'xí'},
      {h:'远',p:'yuǎn'},{h:'玉',p:'yù'},{h:'义',p:'yì'}
    ]},
    { id: 'k12', name: '课文12·古诗二首', words: [
      {h:'首',p:'shǒu'},{h:'采',p:'cǎi'},{h:'无',p:'wú'},{h:'树',p:'shù'},
      {h:'爱',p:'ài'},{h:'尖',p:'jiān'},{h:'角',p:'jiǎo'}
    ]},
    { id: 'k13', name: '课文13·荷叶圆圆', words: [

      {h:'鱼',p:'yú'},{h:'朋',p:'péng'},{h:'美',p:'měi'}
    ]},
    { id: 'k14', name: '课文14·要下雨了', words: [
      {h:'直',p:'zhí'},{h:'呀',p:'ya'},{h:'边',p:'biān'},{h:'呢',p:'ne'},
      {h:'吗',p:'ma'},{h:'吧',p:'ba'},{h:'加',p:'jiā'}
    ]},
    { id: 'k15', name: '课文15·文具的家', words: [
      {h:'文',p:'wén'},{h:'次',p:'cì'},{h:'找',p:'zhǎo'},{h:'平',p:'píng'},
      {h:'办',p:'bàn'},{h:'让',p:'ràng'},{h:'包',p:'bāo'}
    ]},
    { id: 'k16', name: '课文16·一分钟', words: [
      {h:'钟',p:'zhōng'},{h:'元',p:'yuán'},{h:'洗',p:'xǐ'},{h:'共',p:'gòng'},
      {h:'汽',p:'qì'},{h:'已',p:'yǐ'},{h:'经',p:'jīng'}
    ]},
    { id: 'k17', name: '课文17·动物王国开大会', words: [
      {h:'点',p:'diǎn'},{h:'连',p:'lián'},{h:'还',p:'hái'},{h:'家',p:'jiā'},
      {h:'百',p:'bǎi'},{h:'舌',p:'shé'},{h:'活',p:'huó'}
    ]},
    { id: 'k18', name: '课文18·小猴子下山', words: [
      {h:'块',p:'kuài'},{h:'捉',p:'zhuō'},{h:'非',p:'fēi'},{h:'常',p:'cháng'},
      {h:'往',p:'wǎng'},{h:'瓜',p:'guā'},{h:'进',p:'jìn'}
    ]},
    { id: 'k19', name: '课文19·棉花姑娘', words: [
      {h:'病',p:'bìng'},{h:'医',p:'yī'},{h:'别',p:'bié'},{h:'干',p:'gàn'},
      {h:'奇',p:'qí'},{h:'七',p:'qī'},{h:'星',p:'xīng'}
    ]},
    { id: 'k20', name: '课文20·咕咚', words: [
      {h:'吓',p:'xià'},{h:'怕',p:'pà'},{h:'跟',p:'gēn'},{h:'家',p:'jiā'},
      {h:'羊',p:'yáng'},{h:'象',p:'xiàng'},{h:'都',p:'dōu'}
    ]},
    { id: 'k21', name: '课文21·小壁虎借尾巴', words: [
      {h:'捉',p:'zhuō'},{h:'条',p:'tiáo'},{h:'爬',p:'pá'},{h:'姐',p:'jiě'},
      {h:'您',p:'nín'},{h:'房',p:'fáng'},{h:'转',p:'zhuǎn'}
    ]}
  ];

  /* ============= 工具 ============= */
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ============= 渲染 ============= */
  function buildPinyinSection(words) {
    const items = shuffle(words);
    let html = '<div class="section">';
    html += '<div class="section-title">一、看拼音，写汉字 <span class="tip">（在横线上写出对应汉字）</span></div>';
    html += '<div class="pinyin-grid">';
    items.forEach((w, i) => {
      html += `<div class="pinyin-item">
        <span class="num">${i + 1}.</span>
        <span class="py">${w.p}</span>
        <span class="ans-line"></span>
      </div>`;
    });
    html += '</div></div>';
    return html;
  }

  function buildTianSection(words) {
    let html = '<div class="section">';
    html += '<div class="section-title">二、田字格练写 <span class="tip">（按笔顺抄写，注意结构）</span></div>';
    words.forEach((w, i) => {
      html += '<div class="tian-row">';
      html += `<div class="tian-num">${i + 1}.</div>`;
      for (let c = 0; c < 4; c++) {
        const isFirst = c === 0;
        html += `<div class="tian-cell">
          <div class="tian-py">${isFirst ? w.p : ''}</div>
          <div class="tian-box">${isFirst ? `<span class="tian-char">${w.h}</span>` : ''}</div>
        </div>`;
      }
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  /* ============= 主流程 ============= */
  function init() {
    const sel = document.getElementById('sel-unit');
    UNITS.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.name;
      sel.appendChild(opt);
    });

    document.getElementById('btn-generate').addEventListener('click', render);
    document.getElementById('btn-print').addEventListener('click', () => window.print());
    sel.addEventListener('change', render);
    document.getElementById('cb-pinyin').addEventListener('change', render);
    document.getElementById('cb-tian').addEventListener('change', render);

    render();
  }

  function render() {
    const id = document.getElementById('sel-unit').value;
    const unit = UNITS.find(u => u.id === id) || UNITS[0];
    const showPinyin = document.getElementById('cb-pinyin').checked;
    const showTian   = document.getElementById('cb-tian').checked;

    document.getElementById('page-title').textContent =
      `语文一年级下册 · ${unit.name}`;

    const c = document.getElementById('content');
    c.innerHTML = '';
    if (showPinyin) c.innerHTML += buildPinyinSection(unit.words);
    if (showTian)   c.innerHTML += buildTianSection(unit.words);
    if (!showPinyin && !showTian) {
      c.innerHTML = '<div style="text-align:center;color:#999;padding:60px 0;">请至少选择一种题型</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
