<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小学语文一年级下册 单元练习</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "宋体", "SimSun", serif; background: #f0f0f0; }

  /* ===== 控制栏 ===== */
  #controls {
    position: sticky; top: 0; z-index: 10;
    background: #2e7d32; color: #fff;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  #controls h1 { font-size: 16px; margin-right: 6px; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .ctrl-group select {
    padding: 4px 8px; font-size: 14px; border: none; border-radius: 4px;
    font-family: inherit; cursor: pointer; min-width: 220px;
  }
  .ctrl-group label {
    display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none;
  }
  .ctrl-group input[type="checkbox"] { accent-color: #ffeb3b; }
  .sep { width: 1px; height: 26px; background: rgba(255,255,255,.4); }
  #controls button {
    padding: 6px 16px; font-size: 14px; border: none; border-radius: 4px;
    cursor: pointer; font-weight: bold; font-family: inherit;
  }
  #controls button:hover { opacity: .85; }
  #btn-generate { background: #ffeb3b; color: #1a237e; }
  #btn-print    { background: #f57c00; color: #fff; }

  /* ===== A4 页面 ===== */
  #page-wrapper { display: flex; justify-content: center; padding: 24px 0 40px; }
  #a4-page {
    width: 210mm; min-height: 297mm; background: #fff;
    padding: 12mm; box-shadow: 0 3px 18px rgba(0,0,0,.25);
    display: flex; flex-direction: column;
  }
  .page-title {
    text-align: center; font-size: 20px; font-weight: bold;
    letter-spacing: 2px; padding-bottom: 6px;
    border-bottom: 1px solid #999;
  }
  .info-bar {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 7px 4px; font-size: 13px;
    margin-bottom: 6px; color: #555;
  }
  .info-fill {
    display: inline-block; width: 80px;
    border-bottom: 1px solid #999; margin: 0 4px; height: 18px;
    vertical-align: bottom;
  }

  .section { margin-top: 10px; page-break-inside: avoid; }
  .section-title {
    font-weight: bold; font-size: 14px;
    padding: 2px 0 4px;
    margin-bottom: 8px;
    color: #000;
  }
  .tip { font-size: 11px; color: #888; font-weight: normal; margin-left: 6px; }

  /* ----- 拼音区 ----- */
  .pinyin-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 4px 16px;
  }
  .pinyin-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; padding: 6px 6px;
  }
  .pinyin-item .num { color: #999; min-width: 22px; font-size: 12px; }
  .pinyin-item .py {
    font-family: "Times New Roman", serif;
    font-size: 16px; color: #000; min-width: 100px;
    letter-spacing: 1px;
  }
  .pinyin-item .ans-line { flex: 1; border-bottom: 1px solid #999; height: 18px; }

  /* ----- 田字格区 ----- */
  .tian-row {
    display: grid;
    grid-template-columns: 22px repeat(4, 1fr);
    gap: 0 4px;
    margin-bottom: 5px;
    align-items: stretch;
  }
  .tian-num { font-size: 11px; color: #999; padding-top: 22px; }
  .tian-cell { display: flex; flex-direction: column; }
  .tian-py {
    text-align: center;
    font-family: "Times New Roman", serif;
    color: #888; font-size: 13px;
    min-height: 18px; padding: 1px 0;
    letter-spacing: 1px;
  }
  .tian-box {
    height: 16mm;
    border: 1px solid #999;
    background:
      linear-gradient(to right, transparent calc(50% - 0.5px), #ccc calc(50% - 0.5px), #ccc calc(50% + 0.5px), transparent calc(50% + 0.5px)),
      linear-gradient(to bottom, transparent calc(50% - 0.5px), #ccc calc(50% - 0.5px), #ccc calc(50% + 0.5px), transparent calc(50% + 0.5px));
    background-size: 3px 100%, 100% 3px;
    background-position: center, center;
    background-repeat: repeat-x, repeat-y;
    display: flex; align-items: center; justify-content: center;
  }
  .tian-char {
    color: #d8d8d8; font-size: 38px; line-height: 1;
    font-family: "楷体", "KaiTi", serif;
  }

  /* ----- 组词区 ----- */
  .ci-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 4px 16px;
  }
  .ci-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; padding: 7px 6px;
  }
  .ci-num { color: #999; min-width: 22px; font-size: 12px; }
  .ci-char {
    font-family: "楷体", "KaiTi", serif;
    font-size: 18px; font-weight: bold;
    min-width: 24px; text-align: center;
  }
  .ci-py {
    font-family: "Times New Roman", serif;
    font-size: 12px; color: #888; min-width: 56px;
  }
  .ci-blank {
    flex: 1; border-bottom: 1px solid #999; height: 18px;
  }
  .ci-blank + .ci-blank { margin-left: 8px; }

  .footer {
    text-align: center; font-size: 11px; color: #aaa;
    padding-top: 8px; margin-top: auto;
  }

  /* ===== 打印 ===== */
  @media print {
    @page { size: A4 portrait; margin: 8mm 10mm; }
    body { background: none; }
    #controls { display: none !important; }
    #page-wrapper { padding: 0; display: block; }
    #a4-page {
      width: 100%; min-height: auto; height: 281mm;
      box-shadow: none; padding: 0;
    }
  }
</style>
</head>
<body>

<div id="controls">
  <h1>语文一年级下册 单元练习</h1>
  <div class="sep"></div>
  <div class="ctrl-group">
    <span>课文：</span>
    <select id="sel-unit"></select>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <label><input type="checkbox" id="cb-pinyin" checked /> 看拼音写字</label>
    <label><input type="checkbox" id="cb-tian"   checked /> 田字格练写</label>
    <label><input type="checkbox" id="cb-ci"     checked /> 组词练习</label>
  </div>
  <div class="sep"></div>
  <button id="btn-generate">⟳ 重新生成</button>
  <button id="btn-print">🖨 打印</button>
</div>

<div id="page-wrapper">
  <div id="a4-page">
    <div class="page-title" id="page-title">语文一年级下册 · 单元练习</div>
    <div class="info-bar">
      <span>姓名：<span class="info-fill"></span></span>
      <span>班级：<span class="info-fill"></span></span>
      <span>日期：<span class="info-fill" style="width:100px;"></span></span>
      <span>得分：<span class="info-fill" style="width:60px;"></span></span>
    </div>
    <div id="content"></div>
    <div class="footer">教材：人民教育出版社 · 义务教育教科书 · 语文一年级下册</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ============================================================
   * 词库：人教统编版 一年级下册 各课会写字（依据课本"写字表"导入）
   * 数据：{ id, name, words:[{h:汉字, p:拼音}] }
   * ============================================================ */
  const UNITS = [
    /* —— 第一单元 · 识字 —— */
    { id: 'sz1', name: '识字1·春夏秋冬', words: [
      {h:'春',p:'chūn'},{h:'冬',p:'dōng'},{h:'吹',p:'chuī'},
      {h:'花',p:'huā'},{h:'飞',p:'fēi'},{h:'入',p:'rù'}
    ]},
    { id: 'sz2', name: '识字2·姓氏歌', words: [
      {h:'什',p:'shén'},{h:'么',p:'me'},{h:'古',p:'gǔ'},
      {h:'胡',p:'hú'},{h:'双',p:'shuāng'},{h:'言',p:'yán'}
    ]},
    { id: 'sz3', name: '识字3·小青蛙', words: [
      {h:'青',p:'qīng'},{h:'清',p:'qīng'},{h:'晴',p:'qíng'},
      {h:'苗',p:'miáo'},{h:'请',p:'qǐng'},{h:'生',p:'shēng'}
    ]},
    { id: 'sz4', name: '识字4·猜字谜', words: [
      {h:'字',p:'zì'},{h:'红',p:'hóng'},{h:'动',p:'dòng'},
      {h:'万',p:'wàn'},{h:'无',p:'wú'},{h:'明',p:'míng'}
    ]},
    { id: 'yd1', name: '语文园地一', words: [
      {h:'文',p:'wén'},{h:'卡',p:'kǎ'},{h:'片',p:'piàn'},{h:'合',p:'hé'}
    ]},

    /* —— 第二单元 · 课文 —— */
    { id: 'k1', name: '课文1·热爱中国共产党', words: [
      {h:'共',p:'gòng'},{h:'产',p:'chǎn'},{h:'党',p:'dǎng'},
      {h:'太',p:'tài'},{h:'阳',p:'yáng'},{h:'光',p:'guāng'}
    ]},
    { id: 'k2', name: '课文2·吃水不忘挖井人', words: [
      {h:'井',p:'jǐng'},{h:'主',p:'zhǔ'},{h:'江',p:'jiāng'},
      {h:'住',p:'zhù'},{h:'方',p:'fāng'},{h:'后',p:'hòu'}
    ]},
    { id: 'k3', name: '课文3·我多想去看看', words: [
      {h:'告',p:'gào'},{h:'的',p:'de'},{h:'会',p:'huì'},
      {h:'北',p:'běi'},{h:'京',p:'jīng'},{h:'广',p:'guǎng'}
    ]},
    { id: 'yd2', name: '语文园地二', words: [
      {h:'写',p:'xiě'},{h:'认',p:'rèn'}
    ]},

    /* —— 第三单元 · 课文 —— */
    { id: 'k4', name: '课文4·小公鸡和小鸭子', words: [
      {h:'走',p:'zǒu'},{h:'河',p:'hé'},{h:'说',p:'shuō'},
      {h:'让',p:'ràng'},{h:'自',p:'zì'},{h:'己',p:'jǐ'}
    ]},
    { id: 'k5', name: '课文5·树和喜鹊', words: [
      {h:'从',p:'cóng'},{h:'好',p:'hǎo'},{h:'们',p:'men'},
      {h:'叫',p:'jiào'},{h:'他',p:'tā'},{h:'回',p:'huí'}
    ]},
    { id: 'k6', name: '课文6·怎么都快乐', words: [
      {h:'快',p:'kuài'},{h:'乐',p:'lè'},{h:'当',p:'dāng'},
      {h:'书',p:'shū'},{h:'画',p:'huà'},{h:'毛',p:'máo'}
    ]},
    { id: 'k7', name: '课文7·静夜思', words: [
      {h:'思',p:'sī'},{h:'床',p:'chuáng'},{h:'前',p:'qián'},
      {h:'地',p:'dì'},{h:'故',p:'gù'},{h:'乡',p:'xiāng'}
    ]},
    { id: 'k8', name: '课文8·夜色', words: [
      {h:'色',p:'sè'},{h:'把',p:'bǎ'},{h:'讲',p:'jiǎng'},
      {h:'样',p:'yàng'},{h:'笑',p:'xiào'},{h:'再',p:'zài'}
    ]},
    { id: 'k9', name: '课文9·端午粽', words: [
      {h:'节',p:'jié'},{h:'米',p:'mǐ'},{h:'间',p:'jiān'},
      {h:'分',p:'fēn'},{h:'吃',p:'chī'},{h:'肉',p:'ròu'}
    ]},
    { id: 'yd3', name: '语文园地三', words: [
      {h:'止',p:'zhǐ'},{h:'斤',p:'jīn'},{h:'寸',p:'cùn'},
      {h:'丁',p:'dīng'},{h:'千',p:'qiān'},{h:'旦',p:'dàn'}
    ]},
    { id: 'yd4', name: '语文园地四', words: [
      {h:'册',p:'cè'},{h:'支',p:'zhī'},{h:'电',p:'diàn'},{h:'衣',p:'yī'}
    ]},

    /* —— 第五单元 · 识字 —— */
    { id: 'sz5', name: '识字5·动物儿歌', words: [
      {h:'物',p:'wù'},{h:'造',p:'zào'},{h:'运',p:'yùn'},
      {h:'欢',p:'huān'},{h:'房',p:'fáng'},{h:'网',p:'wǎng'}
    ]},
    { id: 'sz6', name: '识字6·古对今', words: [
      {h:'对',p:'duì'},{h:'今',p:'jīn'},{h:'雪',p:'xuě'},
      {h:'细',p:'xì'},{h:'夕',p:'xī'},{h:'语',p:'yǔ'}
    ]},
    { id: 'sz7', name: '识字7·操场上', words: [
      {h:'打',p:'dǎ'},{h:'皮',p:'pí'},{h:'跑',p:'pǎo'},
      {h:'足',p:'zú'},{h:'沙',p:'shā'},{h:'包',p:'bāo'}
    ]},
    { id: 'sz8', name: '识字8·人之初', words: [
      {h:'近',p:'jìn'},{h:'习',p:'xí'},{h:'远',p:'yuǎn'},
      {h:'学',p:'xué'},{h:'玉',p:'yù'},{h:'义',p:'yì'}
    ]},

      {h:'饱',p:'bǎo'},{h:'抱',p:'bào'}
    ]},

    /* —— 第六单元 · 课文 —— */
    { id: 'k10', name: '课文10·古诗二首', words: [
      {h:'首',p:'shǒu'},{h:'池',p:'chí'},{h:'采',p:'cǎi'},
      {h:'尖',p:'jiān'},{h:'角',p:'jiǎo'},{h:'早',p:'zǎo'}
    ]},
    { id: 'k11', name: '课文11·浪花', words: [
      {h:'眼',p:'yǎn'},{h:'泪',p:'lèi'},{h:'它',p:'tā'},
      {h:'贝',p:'bèi'},{h:'气',p:'qì'},{h:'娃',p:'wá'}
    ]},
    { id: 'k12', name: '课文12·荷叶圆圆', words: [
      {h:'机',p:'jī'},{h:'台',p:'tái'},{h:'唱',p:'chàng'},
      {h:'伞',p:'sǎn'},{h:'朵',p:'duǒ'},{h:'美',p:'měi'}
    ]},
    { id: 'k13', name: '课文13·要下雨了', words: [
      {h:'这',p:'zhè'},{h:'看',p:'kàn'},{h:'鱼',p:'yú'},
      {h:'面',p:'miàn'},{h:'问',p:'wèn'},{h:'加',p:'jiā'}
    ]},
    { id: 'yd6', name: '语文园地六', words: [
      {h:'豆',p:'dòu'},{h:'斗',p:'dòu'}
    ]},

    /* —— 第七单元 · 课文 —— */
    { id: 'k14', name: '课文14·文具的家', words: [
      {h:'笔',p:'bǐ'},{h:'知',p:'zhī'},{h:'道',p:'dào'},
      {h:'放',p:'fàng'},{h:'平',p:'píng'},{h:'安',p:'ān'}
    ]},
    { id: 'k15', name: '课文15·一分钟', words: [
      {h:'元',p:'yuán'},{h:'灯',p:'dēng'},{h:'车',p:'chē'},
      {h:'站',p:'zhàn'},{h:'坐',p:'zuò'},{h:'老',p:'lǎo'},{h:'师',p:'shī'}
    ]},
    { id: 'k16', name: '课文16·动物王国开大会', words: [
      {h:'国',p:'guó'},{h:'都',p:'dōu'},{h:'百',p:'bǎi'},
      {h:'听',p:'tīng'},{h:'时',p:'shí'},{h:'点',p:'diǎn'},{h:'林',p:'lín'}
    ]},
    { id: 'k17', name: '课文17·小猴子下山', words: [
      {h:'高',p:'gāo'},{h:'兴',p:'xìng'},{h:'着',p:'zhe'},
      {h:'往',p:'wǎng'},{h:'瓜',p:'guā'},{h:'兔',p:'tù'},{h:'进',p:'jìn'}
    ]},
    { id: 'yd7', name: '语文园地七', words: [
      {h:'巾',p:'jīn'},{h:'洗',p:'xǐ'}
    ]},

    /* —— 第八单元 · 课文 —— */
    { id: 'k18', name: '课文18·棉花姑娘', words: [
      {h:'她',p:'tā'},{h:'空',p:'kōng'},{h:'还',p:'hái'},
      {h:'干',p:'gān'},{h:'身',p:'shēn'},{h:'星',p:'xīng'},{h:'久',p:'jiǔ'}
    ]},
    { id: 'k19', name: '课文19·咕咚', words: [
      {h:'吓',p:'xià'},{h:'为',p:'wèi'},{h:'怕',p:'pà'},
      {h:'家',p:'jiā'},{h:'象',p:'xiàng'},{h:'没',p:'méi'},{h:'到',p:'dào'}
    ]},
    { id: 'k20', name: '课文20·小壁虎借尾巴', words: [
      {h:'向',p:'xiàng'},{h:'边',p:'biān'},{h:'行',p:'xíng'},
      {h:'草',p:'cǎo'},{h:'赶',p:'gǎn'},{h:'过',p:'guò'},{h:'找',p:'zhǎo'}
    ]},
    { id: 'yd8', name: '语文园地八', words: [
      {h:'页',p:'yè'},{h:'户',p:'hù'},{h:'交',p:'jiāo'},{h:'父',p:'fù'}
    ]}
  ];

  /* ============= 工具 ============= */
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ============= 渲染 ============= */
  function buildPinyinSection(words) {
    const items = shuffle(words);
    let html = '<div class="section">';
    html += '<div class="section-title">一、看拼音，写汉字 <span class="tip">（在横线上写出对应汉字）</span></div>';
    html += '<div class="pinyin-grid">';
    items.forEach((w, i) => {
      html += `<div class="pinyin-item">
        <span class="num">${i + 1}.</span>
        <span class="py">${w.p}</span>
        <span class="ans-line"></span>
      </div>`;
    });
    html += '</div></div>';
    return html;
  }

  function buildTianSection(words) {
    let html = '<div class="section">';
    html += '<div class="section-title">二、田字格练写 <span class="tip">（按笔顺抄写，注意结构）</span></div>';
    words.forEach((w, i) => {
      html += '<div class="tian-row">';
      html += `<div class="tian-num">${i + 1}.</div>`;
      for (let c = 0; c < 4; c++) {
        const isFirst = c === 0;
        html += `<div class="tian-cell">
          <div class="tian-py">${isFirst ? w.p : ''}</div>
          <div class="tian-box">${isFirst ? `<span class="tian-char">${w.h}</span>` : ''}</div>
        </div>`;
      }
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function buildCiSection(words) {
    let html = '<div class="section">';
    html += '<div class="section-title">三、组词练习 <span class="tip">（用每个字组两个不同的词语）</span></div>';
    html += '<div class="ci-grid">';
    words.forEach((w, i) => {
      html += `<div class="ci-item">
        <span class="ci-num">${i + 1}.</span>
        <span class="ci-char">${w.h}</span>
        <span class="ci-py">(${w.p})</span>
        <span class="ci-blank"></span>
        <span class="ci-blank"></span>
      </div>`;
    });
    html += '</div></div>';
    return html;
  }

  /* ============= 主流程 ============= */
  function init() {
    const sel = document.getElementById('sel-unit');
    UNITS.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.name;
      sel.appendChild(opt);
    });

    document.getElementById('btn-generate').addEventListener('click', render);
    document.getElementById('btn-print').addEventListener('click', () => window.print());
    sel.addEventListener('change', render);
    document.getElementById('cb-pinyin').addEventListener('change', render);
    document.getElementById('cb-tian').addEventListener('change', render);
    document.getElementById('cb-ci').addEventListener('change', render);

    render();
  }

  function render() {
    const id = document.getElementById('sel-unit').value;
    const unit = UNITS.find(u => u.id === id) || UNITS[0];
    const showPinyin = document.getElementById('cb-pinyin').checked;
    const showTian   = document.getElementById('cb-tian').checked;
    const showCi     = document.getElementById('cb-ci').checked;

    document.getElementById('page-title').textContent =
      `语文一年级下册 · ${unit.name}`;

    const c = document.getElementById('content');
    c.innerHTML = '';
    if (showPinyin) c.innerHTML += buildPinyinSection(unit.words);
    if (showTian)   c.innerHTML += buildTianSection(unit.words);
    if (showCi)     c.innerHTML += buildCiSection(unit.words);
    if (!showPinyin && !showTian && !showCi) {
      c.innerHTML = '<div style="text-align:center;color:#999;padding:60px 0;">请至少选择一种题型</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
