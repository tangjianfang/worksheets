<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小学语文一年级 · 拼音难点强化训练</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "宋体", "SimSun", serif; background: #eef2f7; font-size: 14px; }

  /* ===== 控制栏 ===== */
  #controls {
    position: sticky; top: 0; z-index: 20;
    background: #1565c0; color: #fff;
    padding: 8px 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  #controls h1 { font-size: 14px; white-space: nowrap; }
  .ctrl-group { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .ctrl-group label {
    display: flex; align-items: center; gap: 3px; cursor: pointer;
    user-select: none; white-space: nowrap;
  }
  .ctrl-group input[type="checkbox"] { accent-color: #ffeb3b; }
  .sep { width: 1px; height: 22px; background: rgba(255,255,255,.35); flex-shrink: 0; }
  #controls button {
    padding: 5px 12px; font-size: 12px; border: none; border-radius: 4px;
    cursor: pointer; font-weight: bold; font-family: inherit; white-space: nowrap;
  }
  #controls button:hover { opacity: .85; }
  #btn-lessons  { background: #fff3e0; color: #e65100; }
  #btn-generate { background: #ffeb3b; color: #1a237e; }
  #btn-answer   { background: #e8f5e9; color: #2e7d32; }
  #btn-print    { background: #f57c00; color: #fff; }
  #btn-home { background: rgba(255,255,255,.18); color: #fff; border: 1px solid rgba(255,255,255,.45); font-weight: normal; }
  #btn-home:hover { background: rgba(255,255,255,.32); }

  /* ===== 课文选择面板 ===== */
  #lesson-panel {
    display: none;
    position: sticky; top: 43px; z-index: 19;
    background: #fff; border-bottom: 2px solid #1565c0;
    padding: 8px 16px 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,.15);
  }
  #lesson-panel.open { display: block; }
  .lp-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; font-size: 12px; color: #555;
  }
  .lp-header strong { color: #1565c0; font-size: 13px; }
  .lp-header button {
    padding: 3px 10px; font-size: 11px; border: 1px solid #1565c0;
    border-radius: 3px; cursor: pointer; background: #e3f2fd; color: #1565c0;
    font-family: inherit;
  }
  .lp-header button:hover { background: #1565c0; color: #fff; }
  .lp-groups { display: flex; gap: 14px; flex-wrap: wrap; }
  .lp-group { min-width: 140px; }
  .lp-group-title {
    font-size: 11px; font-weight: bold; color: #1565c0;
    border-bottom: 1px solid #90caf9; padding-bottom: 3px; margin-bottom: 4px;
  }
  .lp-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: #333; padding: 1px 0; cursor: pointer;
    user-select: none;
  }
  .lp-item input { accent-color: #1565c0; }
  #selected-count { color: #ffeb3b; font-weight: bold; font-size: 12px; }

  /* ===== A4 页面 ===== */
  #page-wrapper { display: flex; justify-content: center; padding: 20px 0 36px; }
  #a4-page {
    width: 210mm; background: #fff;
    padding: 8mm 10mm 6mm;
    box-shadow: 0 3px 18px rgba(0,0,0,.22);
    display: flex; flex-direction: column;
  }

  /* ===== 页头 ===== */
  .page-title {
    text-align: center; font-size: 17px; font-weight: bold;
    letter-spacing: 2px; padding-bottom: 3px;
    border-bottom: 2px solid #1565c0; margin-bottom: 2px;
  }
  .page-subtitle {
    text-align: center; font-size: 11px; color: #1565c0;
    padding: 1px 0 4px; letter-spacing: 1px; line-height: 1.4;
  }
  .info-bar {
    display: flex; justify-content: space-between;
    padding: 4px 2px 5px; font-size: 12px; color: #555;
    border-bottom: 1px dashed #ccc; margin-bottom: 4px;
  }
  .info-fill {
    display: inline-block; width: 70px;
    border-bottom: 1px solid #999; margin: 0 3px; height: 16px;
    vertical-align: bottom;
  }

  /* ===== 通用区块 ===== */
  .section { margin-top: 7px; }
  .section-title {
    font-weight: bold; font-size: 12px;
    padding: 2px 7px; margin-bottom: 5px;
    color: #fff; background: #1565c0;
    border-radius: 2px;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .section-title .tip {
    font-size: 10px; color: rgba(255,255,255,.85); font-weight: normal;
  }

  /* ===== 一、看拼音写词语 ===== */
  .pinyin-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px 8px;
  }
  .pinyin-item {
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    padding: 3px 2px;
  }
  .pinyin-item .py {
    font-family: "Times New Roman", serif;
    font-size: 12px; color: #1565c0; letter-spacing: 0px;
    min-height: 18px; text-align: center; white-space: nowrap;
  }
  .write-pair { display: flex; gap: 3px; }
  .pinyin-item .write-box {
    width: 30px; height: 30px;
    border: 1px solid #999;
    background:
      linear-gradient(to right,  transparent calc(50%-.5px),#ddd calc(50%-.5px),#ddd calc(50%+.5px),transparent calc(50%+.5px)),
      linear-gradient(to bottom, transparent calc(50%-.5px),#ddd calc(50%-.5px),#ddd calc(50%+.5px),transparent calc(50%+.5px));
  }
  .pinyin-item .num { font-size: 9px; color: #bbb; }

  /* ===== 二、看词语注拼音 ===== */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px 8px;
  }
  .char-item {
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    padding: 3px 2px;
  }
  .char-item .py-line {
    width: 90px; border-bottom: 1px solid #999; height: 17px;
    font-family: "Times New Roman", serif; font-size: 11px;
    color: #888; text-align: center;
  }
  .char-item .ch {
    font-family: "楷体","KaiTi",serif;
    font-size: 22px; color: #000; line-height: 1.15; letter-spacing: 4px;
  }
  .char-item .num { font-size: 9px; color: #bbb; }

  /* ===== 三、易混淆辨析 ===== */
  .confuse-outer { display: flex; gap: 8px; flex-wrap: wrap; }
  .confuse-block { flex: 1; min-width: 120px; }
  .confuse-block-title {
    font-size: 11px; font-weight: bold; text-align: center;
    padding: 2px 4px; border-radius: 2px; margin-bottom: 4px;
    font-family: "Times New Roman",serif;
    background: #e3f2fd; color: #1565c0;
    border: 1px solid #90caf9;
  }
  .confuse-list {
    display: grid; grid-template-columns: repeat(2,1fr); gap: 2px;
  }
  .confuse-item {
    display: flex; align-items: center; gap: 3px;
    padding: 2px 3px; border-bottom: 1px dashed #eee; font-size: 12px;
  }
  .confuse-item .ci-ch {
    font-family: "楷体","KaiTi",serif;
    font-size: 14px; min-width: 32px; letter-spacing: 2px;
  }
  .confuse-item .ci-py {
    font-family: "Times New Roman",serif;
    font-size: 11px; color: #555;
  }

  /* ===== 四、田字格练写 ===== */
  .tian-row {
    display: grid;
    grid-template-columns: 18px repeat(6, 1fr);
    gap: 0 4px;
    margin-bottom: 4px;
    align-items: stretch;
  }
  .tian-num { font-size: 9px; color: #bbb; padding-top: 16px; }
  .tian-cell { display: flex; flex-direction: column; }
  .tian-py {
    text-align: center;
    font-family: "Times New Roman",serif;
    color: #1565c0; font-size: 11px;
    min-height: 14px; padding: 1px 0;
  }
  .tian-box {
    height: 12mm;
    border: 1px solid #aaa;
    background:
      linear-gradient(to right,  transparent calc(50%-.5px),#ccc calc(50%-.5px),#ccc calc(50%+.5px),transparent calc(50%+.5px)),
      linear-gradient(to bottom, transparent calc(50%-.5px),#ccc calc(50%-.5px),#ccc calc(50%+.5px),transparent calc(50%+.5px));
    background-size: 3px 100%,100% 3px;
    background-position: center,center;
    background-repeat: repeat-x,repeat-y;
    display: flex; align-items: center; justify-content: center;
  }
  .tian-char {
    color: #d8d8d8; font-size: 28px; line-height: 1;
    font-family: "楷体","KaiTi",serif;
  }

  /* ===== 五、拼读连线 ===== */
  .link-wrap {
    display: flex; justify-content: space-around; align-items: flex-start;
  }
  .link-col {
    display: flex; flex-direction: column; gap: 6px;
  }
  .link-item-py {
    font-family: "Times New Roman",serif;
    font-size: 12px; color: #1565c0; padding: 3px 8px;
    border: 1px solid #90caf9; border-radius: 3px;
    min-width: 100px; text-align: center; white-space: nowrap;
  }
  .link-item-ch {
    font-family: "楷体","KaiTi",serif;
    font-size: 16px; color: #000; padding: 3px 8px;
    border: 1px solid #ccc; border-radius: 3px;
    min-width: 52px; text-align: center; letter-spacing: 3px;
  }
  .link-middle {
    display: flex; flex-direction: column;
    justify-content: space-around; gap: 6px;
    padding: 0 8px; align-items: center;
  }
  .link-dash { width: 60px; border-bottom: 1px dashed #bbb; }

  /* ===== 页脚 ===== */
  .footer {
    text-align: center; font-size: 10px; color: #aaa;
    padding-top: 5px; margin-top: auto;
    border-top: 1px dashed #ddd;
  }

  /* ===== 空状态提示 ===== */
  #empty-tip {
    text-align: center; color: #999; font-size: 14px;
    padding: 40px 0; display: none;
  }
  #empty-tip.show { display: block; }

  /* ===== 答案区 ===== */
  #answer-section {
    margin: 12px auto; width: 210mm;
    background: #fffde7; border: 1px solid #f9a825;
    border-radius: 5px; padding: 10px 16px; font-size: 12px;
    display: none;
  }
  #answer-section.visible { display: block; }
  #answer-section h3 { color: #f57c00; margin-bottom: 6px; font-size: 13px; }
  .ans-grid { display: flex; flex-wrap: wrap; gap: 5px 12px; }
  .ans-item { display: flex; gap: 3px; align-items: baseline; }
  .ans-ch { font-family: "楷体","KaiTi",serif; font-size: 15px; }
  .ans-py { font-family: "Times New Roman",serif; font-size: 11px; color: #555; }

  /* ===== 打印 ===== */
  @media print {
    @page { size: A4 portrait; margin: 7mm 9mm; }
    body { background: none; }
    #controls, #lesson-panel, #answer-section { display: none !important; }
    #page-wrapper { padding: 0; display: block; }
    #a4-page { width: 100%; box-shadow: none; padding: 0; }
    /* 将蓝色标题改为黑色，确保打印清晰 */
    .section-title { background: #000 !important; color: #fff !important; }
    .page-title { color: #000 !important; border-bottom-color: #000 !important; }
    .page-subtitle { color: #333 !important; }
    .info-bar { color: #000 !important; }
    .info-fill { border-bottom-color: #000 !important; }
    .pinyin-item .py { color: #000 !important; }
    .char-item .py-line { border-bottom-color: #000 !important; }
    .tian-py { color: #333 !important; }
    .tian-box { border-color: #888; }
    .confuse-block-title { background: #e8e8e8 !important; color: #000 !important; border-color: #888 !important; }
    .link-item-py { color: #000 !important; border-color: #888 !important; }
    .link-item-ch { border-color: #888 !important; }
    .footer { color: #444 !important; }
    .write-box { border-color: #888; }
  }
  /* ===== 手机端适配 ===== */
  @media screen and (max-width: 820px) {
    #controls { position: relative; }
    #lesson-panel { position: relative; top: 0; }
    #page-wrapper {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding: 8px 0 24px; justify-content: flex-start;
    }
  }
</style>
</head>

    <div id="content"></div>

</div>

<!-- 答案区 -->

  function getInitial(py) {
    if (/^zh/i.test(py)) return 'zh';
    if (/^ch/i.test(py)) return 'ch';
    if (/^sh/i.test(py)) return 'sh';
    const m = py.match(/^([bpmfdtnlgkhjqxzcsryw])/i);
    return m ? m[1].toLowerCase() : '';
  }

  /* ============================================================
   * 工具函数
   * ============================================================ */
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function pick(arr, n) { return shuffle(arr).slice(0, Math.min(n, arr.length)); }

  /* ============================================================
   * 构建课文选择面板
   * ============================================================ */
  const GROUP_ORDER = ['识字', '课文', '园地'];
  const grouped = {};
  UNITS.forEach(u => {
    if (!grouped[u.group]) grouped[u.group] = [];
    grouped[u.group].push(u);
  });

  const lpGroups = document.getElementById('lp-groups');
  GROUP_ORDER.forEach(g => {
    if (!grouped[g]) return;
    const col = document.createElement('div');
    col.className = 'lp-group';
    const title = document.createElement('div');
    title.className = 'lp-group-title';
    title.textContent = g;
    col.appendChild(title);
    grouped[g].forEach(u => {
      const lbl = document.createElement('label');
      lbl.className = 'lp-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.value = u.id;
      cb.addEventListener('change', () => { updateCount(); generate(); });
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(' ' + u.name));
      col.appendChild(lbl);
    });
    lpGroups.appendChild(col);
  });

  function getCheckedIds() {
    return [...document.querySelectorAll('#lp-groups input[type=checkbox]:checked')]
      .map(cb => cb.value);
  }

  function updateCount() {
    const n = getCheckedIds().length;
    document.getElementById('selected-count').textContent = '（' + n + '）';
  }

  document.getElementById('btn-select-all').addEventListener('click', () => {
    document.querySelectorAll('#lp-groups input[type=checkbox]').forEach(cb => cb.checked = true);
    updateCount(); generate();
  });
  document.getElementById('btn-select-none').addEventListener('click', () => {
    document.querySelectorAll('#lp-groups input[type=checkbox]').forEach(cb => cb.checked = false);
    updateCount(); generate();
  });

  document.getElementById('btn-lessons').addEventListener('click', () => {
    document.getElementById('lesson-panel').classList.toggle('open');
  });

  /* ============================================================
   * 生成练习题
   * ============================================================ */
  function generate() {
    const ids = getCheckedIds();
    const content = document.getElementById('content');
    const emptyTip = document.getElementById('empty-tip');

    if (ids.length === 0) {
      content.innerHTML = '';
      emptyTip.classList.add('show');
      document.getElementById('page-subtitle').textContent = '请先选择课文';
      document.getElementById('ans-grid').innerHTML = '';
      document.getElementById('answer-section').classList.remove('visible');
      return;
    }
    emptyTip.classList.remove('show');

    // 汇总选中课文的字（以汉字去重）
    const selectedUnits = UNITS.filter(u => ids.includes(u.id));
    const shortNames = selectedUnits.map(u =>
      u.name.replace(/^(识字|课文|语文)/, '').replace(/^园地/, '园地').slice(0, 8)
    );
    const nameStr = shortNames.join('、');
    document.getElementById('page-subtitle').textContent =
      '课文：' + (nameStr.length > 55 ? nameStr.slice(0, 53) + '…' : nameStr);

    const charMap = {};
    selectedUnits.forEach(u => u.words.forEach(w => { charMap[w.h] = w; }));
    const allSingleChars = shuffle(Object.values(charMap));

    // 转换为2字词语（去重同词）
    const seenW = new Set();
    const allPhrases = [];
    allSingleChars.forEach(w => {
      const wm = WORD_MAP[w.h];
      const word = wm ? wm.w : w.h;
      if (!seenW.has(word)) {
        seenW.add(word);
        allPhrases.push({ h: wm ? wm.w : w.h, p: wm ? wm.p : w.p, keyH: w.h, keyP: w.p });
      }
    });

    // 更新答案区（显示词语）
    const ansGrid = document.getElementById('ans-grid');
    ansGrid.innerHTML = '';
    allPhrases.forEach(w => {
      const item = document.createElement('div'); item.className = 'ans-item';
      const ch = document.createElement('span'); ch.className = 'ans-ch'; ch.textContent = w.h;
      const py = document.createElement('span'); py.className = 'ans-py'; py.textContent = w.p;
      item.append(ch, document.createTextNode('：'), py);
      ansGrid.appendChild(item);
    });
    document.getElementById('answer-section').classList.remove('visible');

    content.innerHTML = '';
    let sn = 1;  // section number

    // ── 一、看拼音写词语 ──
    if (document.getElementById('cb-pw').checked) {
      const words = pick(allPhrases, 8);
      const sec = document.createElement('div'); sec.className = 'section';
      const t = document.createElement('div'); t.className = 'section-title';
      t.innerHTML = sn++ + '. 看拼音，写词语 <span class="tip">（根据拼音在格内写出对应词语）</span>';
      sec.appendChild(t);
      const grid = document.createElement('div'); grid.className = 'pinyin-grid';
      words.forEach((w, i) => {
        const item = document.createElement('div'); item.className = 'pinyin-item';
        item.innerHTML =
          '<div class="py">' + w.p + '</div>' +
          '<div class="write-pair"><div class="write-box"></div><div class="write-box"></div></div>' +
          '<div class="num">' + (i + 1) + '</div>';
        grid.appendChild(item);
      });
      sec.appendChild(grid);
      content.appendChild(sec);
    }

    // ── 二、看词语注拼音 ──
    if (document.getElementById('cb-cw').checked) {
      const words = pick(allPhrases, 8);
      const sec = document.createElement('div'); sec.className = 'section';
      const t = document.createElement('div'); t.className = 'section-title';
      t.innerHTML = sn++ + '. 看词语，注拼音 <span class="tip">（在横线上注音，注意声调）</span>';
      sec.appendChild(t);
      const grid = document.createElement('div'); grid.className = 'char-grid';
      words.forEach((w, i) => {
        const item = document.createElement('div'); item.className = 'char-item';
        item.innerHTML =
          '<div class="py-line"></div>' +
          '<div class="ch">' + w.h + '</div>' +
          '<div class="num">' + (i + 1) + '</div>';
        grid.appendChild(item);
      });
      sec.appendChild(grid);
      content.appendChild(sec);
    }

    // ── 三、易混淆辨析（自动检测当前词库的难点，按关键字声母分组） ──
    if (document.getElementById('cb-cf').checked) {
      const activePairs = DIFF_PAIRS.filter(pair => {
        const sidesWithWords = pair.initials.filter(ini =>
          allPhrases.some(w => getInitial(w.keyP) === ini)
        );
        return sidesWithWords.length >= 2;
      });

      if (activePairs.length > 0) {
        const sec = document.createElement('div'); sec.className = 'section';
        const t = document.createElement('div'); t.className = 'section-title';
        const tagHtml = activePairs.map(p =>
          '<span style="background:rgba(255,255,255,.22);padding:0 5px;border-radius:8px;font-size:10px;">' + p.label + '</span>'
        ).join(' ');
        t.innerHTML = sn++ + '. 易混淆拼音辨析 <span class="tip">' + tagHtml + '</span>';
        sec.appendChild(t);

        const outer = document.createElement('div'); outer.className = 'confuse-outer';
        activePairs.slice(0, 3).forEach(pair => {
          const block = document.createElement('div'); block.className = 'confuse-block';
          block.innerHTML = '<div class="confuse-block-title">' + pair.label + '</div>';
          const list = document.createElement('div'); list.className = 'confuse-list';
          pair.initials.forEach(ini => {
            pick(allPhrases.filter(w => getInitial(w.keyP) === ini), 3).forEach(w => {
              const item = document.createElement('div'); item.className = 'confuse-item';
              item.innerHTML =
                '<span class="ci-ch">' + w.h + '</span>' +
                '<span class="ci-py">' + w.p + '</span>';
              list.appendChild(item);
            });
          });
          block.appendChild(list);
          outer.appendChild(block);
        });
        sec.appendChild(outer);
        content.appendChild(sec);
      }
    }

    // ── 四、田字格练写（优先选难点声母词，以词语形式展示） ──
    if (document.getElementById('cb-ti').checked) {
      const difficultInitials = ['b','p','q','j','zh','ch','sh','z','c','s','d','t','n','l'];
      const difficult = allPhrases.filter(w => difficultInitials.includes(getInitial(w.keyP)));
      const pool = difficult.length >= 3 ? difficult : allPhrases;
      const words = pick(pool, 3);

      const sec = document.createElement('div'); sec.className = 'section';
      const t = document.createElement('div'); t.className = 'section-title';
      t.innerHTML = sn++ + '. 田字格练写 <span class="tip">（先看例字词，再在后面的格内描红并练写）</span>';
      sec.appendChild(t);

      words.forEach((w, idx) => {
        const row = document.createElement('div'); row.className = 'tian-row';
        const num = document.createElement('div'); num.className = 'tian-num';
        num.textContent = idx + 1 + '.'; row.appendChild(num);
        const chars = w.h.split('');
        const pys = w.p.split(' ');
        // 例字1（带拼音）
        row.innerHTML += '<div class="tian-cell"><div class="tian-py">' + (pys[0]||w.p) + '</div>' +
          '<div class="tian-box"><span class="tian-char">' + chars[0] + '</span></div></div>';
        // 例字2（第二个字或空格）
        row.innerHTML += '<div class="tian-cell"><div class="tian-py">' + (chars[1] ? (pys[1]||'') : '') + '</div>' +
          '<div class="tian-box">' + (chars[1] ? '<span class="tian-char">' + chars[1] + '</span>' : '') + '</div></div>';
        // 描红格（词语1+2）
        row.innerHTML += '<div class="tian-cell"><div class="tian-py"></div>' +
          '<div class="tian-box"><span class="tian-char" style="color:#ececec">' + chars[0] + '</span></div></div>';
        row.innerHTML += '<div class="tian-cell"><div class="tian-py"></div>' +
          '<div class="tian-box">' + (chars[1] ? '<span class="tian-char" style="color:#ececec">' + chars[1] + '</span>' : '') + '</div></div>';
        // 空白格（2格）
        for (let i = 0; i < 2; i++) {
          row.innerHTML += '<div class="tian-cell"><div class="tian-py"></div><div class="tian-box"></div></div>';
        }
        sec.appendChild(row);
      });
      content.appendChild(sec);
    }

    // ── 五、拼读连线 ──
    if (document.getElementById('cb-lk').checked && allPhrases.length >= 4) {
      const selected = pick(allPhrases, Math.min(6, allPhrases.length));
      const shuffledWords = shuffle(selected.map(w => w.h));

      const sec = document.createElement('div'); sec.className = 'section';
      const t = document.createElement('div'); t.className = 'section-title';
      t.innerHTML = sn++ + '. 拼读连线 <span class="tip">（将左边拼音与右边词语用铅笔连起来）</span>';
      sec.appendChild(t);

      const wrap = document.createElement('div'); wrap.className = 'link-wrap';
      const colL = document.createElement('div'); colL.className = 'link-col';
      const colM = document.createElement('div'); colM.className = 'link-middle';
      const colR = document.createElement('div'); colR.className = 'link-col';

      selected.forEach(w => {
        const p = document.createElement('div'); p.className = 'link-item-py';
        p.textContent = w.p; colL.appendChild(p);
        const d = document.createElement('div'); d.className = 'link-dash';
        colM.appendChild(d);
      });
      shuffledWords.forEach(word => {
        const c = document.createElement('div'); c.className = 'link-item-ch';
        c.textContent = word; colR.appendChild(c);
      });

      wrap.appendChild(colL); wrap.appendChild(colM); wrap.appendChild(colR);
      sec.appendChild(wrap);
      content.appendChild(sec);
    }
  }

  /* ============================================================
   * 事件绑定
   * ============================================================ */
  document.getElementById('btn-generate').addEventListener('click', generate);
  document.getElementById('btn-print').addEventListener('click', () => smartPrint());
  document.getElementById('btn-answer').addEventListener('click', () => {
    document.getElementById('answer-section').classList.toggle('visible');
  });
  // 题型勾选变化时自动重新生成
  ['cb-pw','cb-cw','cb-cf','cb-ti','cb-lk'].forEach(id => {
    document.getElementById(id).addEventListener('change', generate);
  });

  // 默认全选识字课文
  document.querySelectorAll('#lp-groups input[type=checkbox]').forEach(cb => {
    const unit = UNITS.find(u => u.id === cb.value);
    if (unit && unit.group === '识字') cb.checked = true;
  });
  updateCount();
  generate();
})();
</script>
