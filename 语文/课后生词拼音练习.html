<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>课后词语专项训练 · 一年级下册</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "宋体", "SimSun", serif; background: #f0f0f0; }

  /* ===== 控制栏 ===== */
  #controls {
    position: sticky; top: 0; z-index: 10;
    background: #1565c0; color: #fff;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  #controls h1 { font-size: 16px; margin-right: 4px; }
  #controls select, #controls button {
    padding: 5px 10px; font-size: 14px; border: none; border-radius: 4px;
    cursor: pointer; font-family: inherit;
  }
  #controls select { background: #fff; color: #1a237e; min-width: 130px; }
  #controls button { font-weight: bold; }
  #btn-generate { background: #ffeb3b; color: #1a237e; }
  #btn-answer   { background: #e8f5e9; color: #2e7d32; }
  #btn-print    { background: #f57c00; color: #fff; }
  #btn-home {
    background: rgba(255,255,255,.18); color: #fff;
    border: 1px solid rgba(255,255,255,.45); font-weight: normal;
    padding: 5px 10px; text-decoration: none; border-radius: 4px;
    font-size: 13px; display: inline-flex; align-items: center;
  }
  #btn-home:hover { background: rgba(255,255,255,.32); }
  .ctrl-group { display: flex; align-items: center; gap: 6px; font-size: 14px; }
  .sep { width: 1px; height: 24px; background: rgba(255,255,255,.4); }
  .badge {
    background: #ffeb3b; color: #1a237e;
    border-radius: 10px; padding: 1px 8px; font-size: 12px;
    margin-left: 4px;
  }

  /* ===== 课次面板 ===== */
  #lesson-panel {
    background: #fff;
    border-bottom: 2px solid #1565c0;
    padding: 10px 16px;
    display: none;
  }
  #lesson-panel.show { display: block; }
  .lp-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    font-size: 14px; flex-wrap: wrap;
  }
  .lp-header strong { color: #1a237e; }
  .lp-header button {
    padding: 3px 10px; font-size: 12px; border: 1px solid #1565c0;
    background: #fff; color: #1565c0; border-radius: 3px; cursor: pointer;
  }
  .lp-header button:hover { background: #1565c0; color: #fff; }
  .lp-header .hint { color: #999; font-size: 12px; }
  .lp-groups {
    display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px;
  }
  .lp-group {
    flex: 0 0 auto; min-width: 180px;
    border-left: 3px solid #1565c0; padding-left: 8px;
  }
  .lp-group h4 {
    font-size: 13px; color: #1a237e; margin-bottom: 4px;
  }
  .lp-lesson {
    display: flex; align-items: center; gap: 4px;
    padding: 1px 0; cursor: pointer;
  }
  .lp-lesson input { accent-color: #1565c0; }
  .lp-lesson label { cursor: pointer; }

  /* ===== A4 页面 ===== */
  #page-wrapper {
    display: flex; justify-content: center;
    padding: 24px 0 40px;
  }
  #a4-page {
    width: 210mm; min-height: 297mm; background: #fff;
    padding: 12mm; box-shadow: 0 3px 18px rgba(0,0,0,.25);
    display: flex; flex-direction: column;
  }
  .page-title {
    text-align: center; font-size: 20px; font-weight: bold;
    letter-spacing: 2px; padding-bottom: 6px;
    border-bottom: 1px solid #999;
  }
  .page-subtitle {
    text-align: center; font-size: 12px; color: #666;
    padding: 4px 0 6px; border-bottom: 1px dashed #ddd;
  }
  .info-bar {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 7px 4px; font-size: 13px;
    margin-bottom: 6px; color: #555;
    flex-wrap: wrap; gap: 6px;
  }
  .info-fill {
    display: inline-block; width: 80px;
    border-bottom: 1px solid #999; margin: 0 4px; height: 18px;
    vertical-align: bottom;
  }

  /* ===== 通用 ===== */
  .section { margin-top: 8px; flex: 1; }
  .section-title {
    font-weight: bold; font-size: 14px;
    padding: 2px 0 4px; margin-bottom: 8px;
    color: #000;
  }
  .tip { font-size: 11px; color: #888; font-weight: normal; margin-left: 6px; }
  .empty-tip {
    text-align: center; color: #999; padding: 60px 0; font-size: 14px;
  }

  /* ===== 题型 A：看拼音写词语（按题数自适应） ===== */
  .grid-4col { display: grid; }
  .row-A { display: flex; align-items: center; }
  .row-A .num { color: #999; }
  .row-A .py {
    font-family: "Times New Roman", serif; letter-spacing: 0.5px;
  }
  .row-A .ans {
    flex: 1; border-bottom: 1px solid #999;
  }
  /* 5/10 题：2 列大字号（充裕书写空间） */
  .tier-A-5  { grid-template-columns: 1fr 1fr; gap: 18px 32px; }
  .tier-A-5  .row-A { gap: 8px; }
  .tier-A-5  .row-A .num { font-size: 14px; min-width: 30px; }
  .tier-A-5  .row-A .py { min-width: 130px; font-size: 22px; }
  .tier-A-5  .row-A .ans { height: 50px; }
  .tier-A-10 { grid-template-columns: 1fr 1fr; gap: 12px 26px; }
  .tier-A-10 .row-A { gap: 6px; }
  .tier-A-10 .row-A .num { font-size: 12px; min-width: 26px; }
  .tier-A-10 .row-A .py { min-width: 105px; font-size: 17px; }
  .tier-A-10 .row-A .ans { height: 38px; }
  /* 15-20 题：3 列中字号（4 列下答题区过窄） */
  .tier-A-15 { grid-template-columns: 1fr 1fr 1fr; gap: 10px 18px; }
  .tier-A-15 .row-A { gap: 6px; }
  .tier-A-15 .row-A .num { font-size: 12px; min-width: 24px; }
  .tier-A-15 .row-A .py { min-width: 95px; font-size: 16px; }
  .tier-A-15 .row-A .ans { height: 30px; }
  .tier-A-20 { grid-template-columns: 1fr 1fr 1fr; gap: 8px 14px; }
  .tier-A-20 .row-A { gap: 5px; }
  .tier-A-20 .row-A .num { font-size: 11px; min-width: 20px; }
  .tier-A-20 .row-A .py { min-width: 82px; font-size: 14px; }
  .tier-A-20 .row-A .ans { height: 26px; }
  /* 30+ 题：4 列紧凑 */
  .tier-A-30 { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px 8px; }
  .tier-A-30 .row-A { gap: 3px; }
  .tier-A-30 .row-A .num { font-size: 9px; min-width: 16px; }
  .tier-A-30 .row-A .py { min-width: 58px; font-size: 11.5px; }
  .tier-A-30 .row-A .ans { height: 21px; }
  .tier-A-40 { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px 6px; }
  .tier-A-40 .row-A { gap: 3px; }
  .tier-A-40 .row-A .num { font-size: 9px; min-width: 15px; }
  .tier-A-40 .row-A .py { min-width: 50px; font-size: 10.5px; }
  .tier-A-40 .row-A .ans { height: 19px; }
  .tier-A-50 { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 3px 5px; }
  .tier-A-50 .row-A { gap: 2px; }
  .tier-A-50 .row-A .num { font-size: 8px; min-width: 14px; }
  .tier-A-50 .row-A .py { min-width: 44px; font-size: 10px; }
  .tier-A-50 .row-A .ans { height: 17px; }
  .tier-A-60 { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 2px 4px; }
  .tier-A-60 .row-A { gap: 2px; }
  .tier-A-60 .row-A .num { font-size: 8px; min-width: 14px; }
  .tier-A-60 .row-A .py { min-width: 40px; font-size: 9.5px; }
  .tier-A-60 .row-A .ans { height: 15px; }

  /* ===== 题型 B：看词语写拼音 ===== */
  .grid-2col-wide { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; }
  .row-B { display: flex; align-items: flex-start; gap: 6px; }
  .row-B .num { color: #999; min-width: 24px; font-size: 12px; padding-top: 8px; }
  .row-B .word {
    font-family: "楷体", "KaiTi", serif;
    font-size: 18px; min-width: 60px; padding-top: 4px;
  }
  .row-B .py-box {
    flex: 1;
    background:
      linear-gradient(#bbb, #bbb) 0 0/100% 0.5px no-repeat,
      linear-gradient(#bbb, #bbb) 0 12px/100% 0.5px no-repeat,
      linear-gradient(#bbb, #bbb) 0 24px/100% 0.5px no-repeat,
      linear-gradient(#bbb, #bbb) 0 36px/100% 0.5px no-repeat;
    border-bottom: 0.5px solid #999;
    height: 42px;
    position: relative;
  }

  /* ===== 题型 C：词语连线 ===== */
  .grid-c {
    display: grid; grid-template-columns: 1fr 80px 1fr;
    gap: 10px 0; align-items: center;
  }
  .row-C.left  { justify-self: end;   display: flex; align-items: center; gap: 6px; }
  .row-C.right { justify-self: start; display: flex; align-items: center; gap: 6px; }
  .row-C .num { color: #999; font-size: 11px; min-width: 18px; }
  .row-C .py {
    font-family: "Times New Roman", serif; font-size: 14px;
    padding: 4px 10px; border: 1px solid #90caf9; border-radius: 3px;
    background: #f5f9ff;
  }
  .row-C .word {
    font-family: "楷体", "KaiTi", serif; font-size: 16px;
    padding: 4px 10px; border: 1px solid #ccc; border-radius: 3px;
    background: #fff; letter-spacing: 2px;
  }
  .dash-cell {
    border-bottom: 1px dashed #999; height: 0; width: 60px;
    margin: 0 auto;
  }

  /* ===== 题型 D：词语选择 ===== */
  .grid-D { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; }
  .row-D { font-size: 13px; padding: 4px 0; }
  .row-D .num { color: #999; font-size: 11px; margin-right: 4px; }
  .row-D .word {
    font-family: "楷体", "KaiTi", serif; font-size: 18px;
    display: inline-block; min-width: 60px;
  }
  .row-D .opts {
    display: inline-flex; gap: 12px; flex-wrap: wrap;
    margin-left: 8px; font-family: "Times New Roman", serif;
    font-size: 13px;
  }
  .row-D .opt { display: inline-flex; align-items: center; gap: 3px; }
  .row-D .opt-letter { color: #999; font-size: 11px; min-width: 14px; }

  /* ===== 答案区 ===== */
  #answer-section {
    max-width: 760px; margin: 0 auto 24px;
    background: #fffde7; border: 1px solid #f9a825;
    border-radius: 5px; padding: 10px 16px; font-size: 12px;
    display: none;
  }
  #answer-section.show { display: block; }
  #answer-section h3 { color: #f57c00; margin-bottom: 6px; font-size: 13px; }
  .ans-row {
    display: flex; gap: 8px; align-items: baseline;
    padding: 2px 0;
  }
  .ans-row .num { color: #999; min-width: 24px; }
  .ans-row .py { font-family: "Times New Roman", serif; color: #c62828; }
  .ans-row .word { font-family: "楷体", "KaiTi", serif; font-size: 15px; }
  .ans-row .arrow { color: #888; }
  .ans-row .ans-tag { color: #c62828; font-weight: bold; }

  /* ===== 页脚 ===== */
  .footer {
    text-align: center; font-size: 10px; color: #aaa;
    padding-top: 8px; margin-top: auto;
    border-top: 1px dashed #ddd;
  }

  /* ===== 打印 ===== */
  @media print {
    @page { size: A4 portrait; margin: 0; }
    body { background: none; }
    #controls, #lesson-panel, #answer-section, #wx-print-mask { display: none !important; }
    #page-wrapper { padding: 0; }
    #a4-page {
      width: 100%; min-height: auto; box-shadow: none; padding: 10mm 12mm;
      page-break-inside: avoid; break-inside: avoid;
    }
    .page-title { color: #000; font-size: 18px; padding-bottom: 4px; }
    .page-subtitle { color: #333; border-bottom-color: #888; padding: 2px 0 4px; font-size: 11px; }
    .info-bar { padding: 4px 4px 4px; margin-bottom: 4px; font-size: 12px; }
    .section-title { padding: 2px 0 4px; margin-bottom: 6px; font-size: 13px; }
    .section { page-break-inside: avoid; break-inside: avoid; }
    .info-fill { border-bottom-color: #000; }
    .row-A .py, .row-B .word, .row-C .py, .row-C .word, .row-D .word { color: #000; }
    .row-C .py { background: none; border-color: #000; }
    .row-C .word { background: none; border-color: #000; }
    .footer { color: #444; border-top-color: #888; padding-top: 6px; font-size: 9px; }
  }
  /* ===== 手机端 ===== */
  @media screen and (max-width: 820px) {
    #controls { position: relative; }
    #page-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 8px 0 24px; justify-content: flex-start; }
    #a4-page { margin: 0 auto; }
  }
</style>
</head>

<script>

  // ===================================================================
  // 解析 RAW → LESSONS
  // ===================================================================
  function parseRaw(raw) {
    const lessons = [];
    let current = null;
    // 课次标题：识字X/课文X/园地X/词语X（X 为中文数字），可有可无「（...）」
    const titleRe = /^(识字|课文|园地|词语)([一二三四五六七八九十]+)(?:[（(][^)）]*[)）])?\s*$/;
    // 词语单元：同上，「（含写字表字）」等注释不算标题
    const itemRe = /^([a-zA-ZāáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜüĀ-ɏ\s]+?)\s+([一-鿿]+)$/;

    for (const rawLine of raw.split('\n')) {
      const line = rawLine.trim();
      if (!line || line.startsWith('#')) continue;

      const m = line.match(titleRe);
      if (m) {
        if (current) lessons.push(current);
        const prefix = m[1];
        const num = m[2];
        current = {
          id: prefix + num,
          group: prefix,           // 识字/课文/园地/词语
          name: prefix + num,      // 显示名（不带括号内容，保持简洁）
          items: []
        };
        continue;
      }

      if (!current) continue;

      // 用全角空格（U+3000）切分，保留 pinyin+word 内部的普通空格
      const parts = line.split(/　+/).filter(Boolean);
      for (const part of parts) {
        const im = part.match(itemRe);
        if (im) {
          current.items.push({ py: im[1].trim(), word: im[2] });
        }
      }
    }
    if (current) lessons.push(current);
    return lessons;
  }

  const LESSONS = parseRaw(RAW);

  LESSONS.forEach(l => {

    l.items.forEach(it => {

      if (pys.length === it.word.length) {
        for (let i = 0; i < it.word.length; i++) {
          if (!CHAR_PY[it.word[i]]) CHAR_PY[it.word[i]] = pys[i];

  let pyFullMiss = 0;
  LESSONS.forEach(l => {

      const chars = [...it.word];
      if (it.py.includes(' ')) {
        // 词语：py 已是完整词拼音
        it.pyFull = it.py;

        it.pyFull = it.py;

        const parts = chars.map(c => {

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  };

  // ===================================================================

  function collectItems(lessons, selectedIds, type) {
    const pool = [];
    for (const id of selectedIds) {
      const l = lessons.find(x => x.id === id);
      if (!l) continue;
      // Type D 仅取「词语」组
      if (type === 'D' && l.group !== '词语') continue;
      for (const it of l.items) {
        pool.push({ ...it, lessonId: l.id, lessonName: l.name });
      }
    }
    return pool;
  }

  function buildTypeD(items) {

      const correctIdx = options.indexOf(it.py);
      answerKey.push({ word: it.word, py: it.py, letter: String.fromCharCode(65 + correctIdx) });

      html += `<div class="row-D">

        <span class="word">${it.word}</span>

    } else if (type === 'B') {

          <span class="word">${it.word}</span>
          <span class="arrow">→</span>
          <span class="py">${it.py}</span>
        </div>`;
      });
    } else if (type === 'C') {
      // A→3, B→1, C→5, ...
      const sorted = currentAnswer.slice().sort((a, b) =>
        a.leftLetter.localeCompare(b.leftLetter));
      sorted.forEach(a => {
        html += `<div class="ans-row">
          <span class="num">${a.leftLetter}</span>
          <span class="arrow">→</span>
          <span class="ans-tag">${a.rightNum}</span>
          <span class="py" style="margin-left:14px;">${a.py}</span>
          <span class="word">${a.word}</span>
        </div>`;
      });
    } else if (type === 'D') {
      currentAnswer.forEach((a, i) => {
        html += `<div class="ans-row">
          <span class="num">${i + 1}.</span>
          <span class="word">${a.word}</span>
          <span class="arrow">→</span>
          <span class="ans-tag">${a.letter}</span>
          <span class="py" style="margin-left:10px;">${a.py}</span>
        </div>`;
      });
    }
    ac.innerHTML = html;
  }

  // ===================================================================

  function render() {
    const type = document.getElementById('sel-type').value;
    const wantedCount = parseInt(document.getElementById('sel-count').value, 10);

      .map(el => el.dataset.id);

      document.getElementById('subtitle').textContent = '—';
      document.getElementById('answer-section').classList.remove('show');
      return;
    }

    const pool = collectItems(LESSONS, selectedIds, type);
    if (pool.length === 0) {
      const msg = type === 'D'
        ? '当前选中的课中没有「词语」组，请勾选「词语一/二/三/四」'
        : '当前选择的课中没有可练习的词语';
      document.getElementById('content').innerHTML = `<div class="empty-tip">${msg}</div>`;
      document.getElementById('subtitle').textContent = '—';
      document.getElementById('answer-section').classList.remove('show');
      return;
    }

    // Type C/D 自身就有 8/6 上限，按 pool 长度再裁
    const actualCount = Math.min(count, pool.length);
    currentItems = shuffle(pool).slice(0, actualCount);

    // 副标题
    const lessonNames = Array.from(new Set(currentItems.map(it => it.lessonId))).join('、');
    document.getElementById('subtitle').textContent =
      `题型：${TYPE_NAME[type]} · 共 ${actualCount} 题 · 范围：${lessonNames}`;

    // 渲染
    let html = '';
    if (type === 'A') html = buildTypeA(currentItems, actualCount);
    else if (type === 'B') html = buildTypeB(currentItems);
    else if (type === 'C') html = buildTypeC(currentItems);
    else if (type === 'D') html = buildTypeD(currentItems);
    document.getElementById('content').innerHTML = html;

    // 答案
    buildAnswer(type, currentItems);
    document.getElementById('answer-section').classList.remove('show');
  }

  // ===================================================================
  // 课次面板构建
  // ===================================================================
  function buildLessonPanel() {
    const groups = [
      { key: '识字', title: '识字' },
      { key: '课文', title: '课文' },
      { key: '园地', title: '园地' },
      { key: '词语', title: '词语' }
    ];
    // 默认勾选：识字 / 课文 / 园地（不勾选「词语」，仅 D 题型需用）
    const isDefaultChecked = (l) => l.group !== '词语';

    const html = groups.map(g => {
      const ls = LESSONS.filter(l => l.group === g.key);
      const items = ls.map(l => {
        const checked = isDefaultChecked(l) ? 'checked' : '';
        return `<div class="lp-lesson">
          <input type="checkbox" data-id="${l.id}" id="cb-${l.id}" ${checked}>
          <label for="cb-${l.id}">${l.name} <span style="color:#aaa;">(${l.items.length})</span></label>
        </div>`;
      }).join('');
      return `<div class="lp-group">
        <h4>${g.title}（${ls.length}）</h4>
        ${items}
      </div>`;
    }).join('');
    document.getElementById('lp-groups').innerHTML = html;
    updateSelectedCount();
  }

  function updateSelectedCount() {
    const n = document.querySelectorAll('.lp-lesson input:checked').length;
    document.getElementById('selected-count').textContent = n;
  }

  // ===================================================================
  // 事件绑定
  // ===================================================================
  document.getElementById('btn-lessons').addEventListener('click', () => {
    document.getElementById('lesson-panel').classList.toggle('show');
  });
  document.getElementById('btn-select-all').addEventListener('click', () => {
    document.querySelectorAll('.lp-lesson input').forEach(el => el.checked = true);
    updateSelectedCount();
  });
  document.getElementById('btn-select-none').addEventListener('click', () => {
    document.querySelectorAll('.lp-lesson input').forEach(el => el.checked = false);
    updateSelectedCount();
  });
  document.addEventListener('change', e => {
    if (e.target.matches('.lp-lesson input')) updateSelectedCount();
  });
  document.getElementById('btn-generate').addEventListener('click', render);
  document.getElementById('sel-count').addEventListener('change', render);
  document.getElementById('sel-type').addEventListener('change', render);
  document.getElementById('btn-answer').addEventListener('click', () => {
    document.getElementById('answer-section').classList.toggle('show');
  });
  document.getElementById('btn-print').addEventListener('click', () => {
    document.getElementById('answer-section').classList.remove('show');
    smartPrint();
  });

  // 微信检测
  function smartPrint() {
    if (/MicroMessenger/i.test(navigator.userAgent)) {
      document.getElementById('wx-print-mask').style.display = 'block';
      return;
    }
    window.print();
  }

  // ===================================================================
  // 启动
  // ===================================================================
  buildLessonPanel();
  render();
})();
</script>
</body>
</html>
