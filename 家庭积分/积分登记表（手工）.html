<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>家庭积分登记表（手工）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 16px;
    }

    /* 工具栏（屏幕专用）*/
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .toolbar label { font-size: 13px; color: #555; }
    .toolbar select, .toolbar input {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      font-family: inherit;
    }
    .btn-print {
      padding: 7px 20px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-print:hover { background: #0d47a1; }
    .btn-regen {
      padding: 7px 16px;
      background: #43a047;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-regen:hover { background: #2e7d32; }

    /* A4 页面 */
    .page {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      padding: 12mm 14mm 10mm;
      box-shadow: 0 2px 16px rgba(0,0,0,.12);
      page-break-after: always;
    }

    /* 页眉 */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2px solid #1a237e;
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .page-title {
      font-size: 18px;
      font-weight: bold;
      color: #1a237e;
      letter-spacing: 1px;
    }
    .page-meta {
      font-size: 11px;
      color: #666;
      text-align: right;
      line-height: 1.7;
    }
    .page-meta span { display: block; }

    /* 摘要行 */
    .summary-row {
      display: flex;
      gap: 0;
      border: 1px solid #9e9e9e;
      border-bottom: none;
      font-size: 11.5px;
    }
    .summary-cell {
      flex: 1;
      padding: 5px 8px;
      border-right: 1px solid #9e9e9e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .summary-cell:last-child { border-right: none; }
    .summary-cell .slabel { color: #666; white-space: nowrap; }
    .summary-cell .sline {
      flex: 1;
      border-bottom: 1px solid #555;
      min-width: 40px;
      height: 16px;
    }

    /* 登记表格 */
    .ledger {
      width: 100%;
      border-collapse: collapse;
    }
    .ledger th {
      background: #e3f2fd;
      color: #0d47a1;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 5px;
      border: 1px solid #90caf9;
      text-align: center;
      white-space: nowrap;
    }
    .ledger td {
      border: 1px solid #bdbdbd;
      padding: 0;
      height: 22px;
    }
    /* 斑马纹（浅淡，便于书写）*/
    .ledger tbody tr:nth-child(even) td {
      background: #fafafa;
    }

    /* 列宽 */
    .col-no     { width: 28px; }
    .col-date   { width: 68px; }
    .col-proj   { /* auto */ }
    .col-plus   { width: 52px; }
    .col-minus  { width: 52px; }
    .col-total  { width: 52px; }
    .col-remark { width: 100px; }
    .col-sign   { width: 44px; }

    /* 序号列居中 */
    .ledger tbody td.no {
      text-align: center;
      font-size: 10px;
      color: #bbb;
    }

    /* 页脚规则速查 */
    .page-footer {
      margin-top: 8px;
      border-top: 1.5px solid #1a237e;
      padding-top: 6px;
    }
    .footer-title {
      font-size: 10px;
      font-weight: bold;
      color: #1a237e;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid #90caf9;
      font-size: 9.5px;
    }
    .fg-cell {
      padding: 3px 5px;
      border-right: 1px solid #90caf9;
      border-bottom: 1px solid #90caf9;
      line-height: 1.55;
    }
    .fg-cell:nth-child(4n) { border-right: none; }
    .fg-cell:nth-last-child(-n+4) { border-bottom: none; }
    .fg-head {
      background: #e3f2fd;
      font-weight: bold;
      color: #0d47a1;
      text-align: center;
      padding: 3px 5px;
      border-right: 1px solid #90caf9;
      border-bottom: 1px solid #90caf9;
    }
    .fg-head:last-child { border-right: none; }
    .c-plus  { color: #2e7d32; font-weight: bold; }
    .c-minus { color: #c62828; font-weight: bold; }
    .footer-note {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #888;
      margin-top: 3px;
    }

    /* ─── 打印样式 ─── */
    @media print {
      body {
        background: #fff;
        padding: 0;
        display: block;
      }
      .toolbar { display: none; }
      .page {
        box-shadow: none;
        padding: 10mm 12mm 8mm;
        width: 100%;
        min-height: auto;
      }
      .ledger th {
        background: #d6eaff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .ledger tbody tr:nth-child(even) td {
        background: #f9f9f9 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .summary-row {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .fg-head {
        background: #d6eaff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page { size: A4 portrait; margin: 6mm; }
    }
  </style>
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
  <label>每张行数：
    <select id="rowsPerPage" onchange="rebuild()">
      <option value="25">25 行</option>
      <option value="30" selected>30 行</option>
      <option value="35">35 行</option>
      <option value="40">40 行</option>
    </select>
  </label>
  <label>张数：
    <input type="number" id="pageCount" value="2" min="1" max="10" style="width:52px;" onchange="rebuild()" />
  </label>
  <label>起始序号：
    <input type="number" id="startNo" value="1" min="1" max="999" style="width:56px;" onchange="rebuild()" />
  </label>
  <label>起始期初分：
    <input type="number" id="initPts" value="0" step="0.5" style="width:64px;" onchange="rebuild()" />
  </label>
  <button class="btn-regen" onclick="rebuild()">刷新预览</button>
  <button class="btn-print" onclick="window.print()">🖨️ 打印 / 导出PDF</button>
</div>

<!-- 页面容器 -->
<div id="pages"></div>

<script>
  function val(id) { return document.getElementById(id).value; }

  function rebuild() {
    const rowsPerPage = parseInt(val('rowsPerPage')) || 30;
    const pageCount   = Math.min(10, Math.max(1, parseInt(val('pageCount')) || 2));
    const startNo     = Math.max(1, parseInt(val('startNo')) || 1);
    const initPts     = parseFloat(val('initPts')) || 0;
    const container   = document.getElementById('pages');
    container.innerHTML = '';

    for (let p = 0; p < pageCount; p++) {
      const firstRow = startNo + p * rowsPerPage;
      container.appendChild(buildPage(p + 1, pageCount, firstRow, rowsPerPage, initPts, p === 0));
    }
  }

  function buildPage(pageNum, totalPages, firstRow, rows, initPts, isFirst) {
    const page = document.createElement('div');
    page.className = 'page';

    // ── 页眉 ──
    page.innerHTML = `
      <div class="page-header">
        <div class="page-title">🏆 家庭积分登记表</div>
        <div class="page-meta">
          <span>生效日期：2026年6月6日 &nbsp;|&nbsp; 1积分 = 2分钟游戏时间 &nbsp;|&nbsp; 60分可兑换一次</span>
          <span>第 ${pageNum} 页 / 共 ${totalPages} 页</span>
        </div>
      </div>`;

    // ── 摘要行 ──
    const summaryHtml = `
      <div class="summary-row">
        <div class="summary-cell"><span class="slabel">姓名：</span><span class="sline"></span></div>
        <div class="summary-cell"><span class="slabel">本页期初积分：</span><span class="sline">${isFirst ? initPts : ''}</span></div>
        <div class="summary-cell"><span class="slabel">本页合计加分：</span><span class="sline"></span></div>
        <div class="summary-cell"><span class="slabel">本页合计扣分：</span><span class="sline"></span></div>
        <div class="summary-cell"><span class="slabel">本页期末积分：</span><span class="sline"></span></div>
      </div>`;
    page.innerHTML += summaryHtml;

    // ── 表格 ──
    let tableHtml = `
      <table class="ledger">
        <thead>
          <tr>
            <th class="col-no">序号</th>
            <th class="col-date">日期</th>
            <th class="col-proj">项目 / 事由</th>
            <th class="col-plus">加分</th>
            <th class="col-minus">扣分</th>
            <th class="col-total">累计总分</th>
            <th class="col-remark">备注</th>
            <th class="col-sign">家长签字</th>
          </tr>
        </thead>
        <tbody>`;

    for (let i = 0; i < rows; i++) {
      const no = firstRow + i;
      tableHtml += `<tr>
        <td class="no">${no}</td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      </tr>`;
    }

    tableHtml += `</tbody></table>`;
    page.innerHTML += tableHtml;

    // ── 页脚规则速查 ──
    page.innerHTML += `
      <div class="page-footer">
        <div class="footer-title">📋 积分规则速查（生效日期：2026年6月6日）</div>
        <div class="footer-grid">
          <div class="fg-head">项目</div>
          <div class="fg-head">条件</div>
          <div class="fg-head">得分</div>
          <div class="fg-head">备注</div>

          <div class="fg-cell">英语一起学 APP</div>
          <div class="fg-cell">评级 A+</div>
          <div class="fg-cell c-plus">+5 分</div>
          <div class="fg-cell"></div>

          <div class="fg-cell" style="white-space:nowrap">数学试卷</div>
          <div class="fg-cell">满分 / 90分以上或80~89分 / 80分以下</div>
          <div class="fg-cell c-plus">+5 / +1 / 0</div>
          <div class="fg-cell">完成1套口算 <span class="c-plus">+0.5</span></div>

          <div class="fg-cell">语文试卷</div>
          <div class="fg-cell">满分 / 90分以上 / 80~89分 / 80分以下</div>
          <div class="fg-cell c-plus">+15 / +3 / +1 / 0</div>
          <div class="fg-cell">完成1套打印练习 <span class="c-plus">+0.5</span></div>

          <div class="fg-cell">英语试卷</div>
          <div class="fg-cell">满分 / 90分以上 / 80~89分 / 80分以下</div>
          <div class="fg-cell c-plus">+1 / +0.5 / +1 / 0</div>
          <div class="fg-cell"></div>

          <div class="fg-cell">重大奖励</div>
          <div class="fg-cell">月考/期中/期末/竞赛：第一名、A+、学霸</div>
          <div class="fg-cell c-plus">+5 分/次</div>
          <div class="fg-cell"></div>

          <div class="fg-cell">扣分</div>
          <div class="fg-cell">学校试卷成绩 B 及以下</div>
          <div class="fg-cell c-minus">−0.5 分/次</div>
          <div class="fg-cell"></div>

          <div class="fg-cell">积分兑换</div>
          <div class="fg-cell">累计满 60 分，1积分 = 2分钟游戏时间</div>
          <div class="fg-cell c-minus">−60 分/次</div>
          <div class="fg-cell">可兑换 120 分钟</div>
        </div>
        <div class="footer-note">
          <span>打印日期：${new Date().toLocaleDateString('zh-CN')}</span>
          <span>第 ${pageNum} 页 / 共 ${totalPages} 页</span>
        </div>
      </div>`;

    return page;
  }

  rebuild();
</script>
</body>
</html>
